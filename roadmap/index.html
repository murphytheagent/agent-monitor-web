<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Murphy Roadmap</title>
<style>

  .murphy-shell-header {
    position: sticky;
    top: 0;
    z-index: 8;
    display: grid;
    grid-template-columns: minmax(240px, 1.05fr) minmax(280px, 1.3fr) auto;
    gap: 16px 20px;
    align-items: center;
    padding: 18px 24px 16px;
    background:
      linear-gradient(135deg, rgba(5, 9, 24, 0.98) 0%, rgba(9, 16, 38, 0.96) 52%, rgba(19, 12, 34, 0.98) 100%);
    border-bottom: 1px solid rgba(56, 240, 255, 0.28);
    box-shadow:
      0 18px 48px rgba(0, 0, 0, 0.4),
      inset 0 -1px 0 rgba(255, 47, 179, 0.16);
  }
  .murphy-shell-header::after {
    content: "";
    position: absolute;
    inset: auto 24px 0;
    height: 1px;
    background: linear-gradient(
      90deg,
      rgba(56, 240, 255, 0) 0%,
      rgba(56, 240, 255, 0.68) 24%,
      rgba(255, 47, 179, 0.52) 76%,
      rgba(255, 47, 179, 0) 100%
    );
  }
  .murphy-brand {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    min-width: 0;
  }
  .murphy-signature {
    flex: 0 0 auto;
    margin-top: -2px;
    color: #f8fbff;
    text-decoration: none;
    font-family: "Playfair Display", serif;
    font-size: clamp(30px, 3vw, 42px);
    font-style: italic;
    font-weight: 700;
    letter-spacing: 0.04em;
    line-height: 0.88;
    text-shadow:
      3px 0 var(--brand-alt),
      -3px 0 var(--brand),
      0 0 18px rgba(56, 240, 255, 0.18);
  }
  .murphy-context {
    min-width: 0;
    display: grid;
    gap: 6px;
  }
  .murphy-kicker {
    color: var(--brand);
    font-family: "Orbitron", "Rajdhani", sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .murphy-title-row {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 8px;
  }
  .murphy-surface {
    color: #f4fbff;
    font-family: "Orbitron", "Rajdhani", sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .murphy-divider {
    color: rgba(56, 240, 255, 0.55);
    font-size: 16px;
  }
  .murphy-note {
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.35;
  }
  .murphy-nav {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
  }
  .murphy-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 38px;
    padding: 8px 12px;
    border: 1px solid rgba(56, 240, 255, 0.2);
    background:
      linear-gradient(135deg, rgba(5, 9, 24, 0.94) 0%, rgba(12, 20, 42, 0.92) 100%);
    box-shadow:
      3px 3px 0 rgba(255, 47, 179, 0.16),
      -1px -1px 0 rgba(56, 240, 255, 0.12);
    color: var(--text-main);
    text-decoration: none;
    font-family: "Orbitron", "Rajdhani", sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition:
      border-color 0.15s ease,
      box-shadow 0.15s ease,
      transform 0.15s ease;
  }
  .murphy-link:hover {
    border-color: rgba(255, 47, 179, 0.42);
    box-shadow:
      5px 5px 0 rgba(255, 47, 179, 0.24),
      -2px -2px 0 rgba(56, 240, 255, 0.18);
    transform: translateY(-1px);
  }
  .murphy-link.current,
  .murphy-link[aria-current="page"] {
    border-color: rgba(56, 240, 255, 0.58);
    background:
      linear-gradient(135deg, rgba(16, 31, 58, 0.98) 0%, rgba(38, 18, 58, 0.94) 100%);
    box-shadow:
      4px 4px 0 rgba(255, 47, 179, 0.28),
      -2px -2px 0 rgba(56, 240, 255, 0.22);
  }
  .murphy-tools {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: flex-end;
    gap: 10px;
  }
  .murphy-status {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    border: 1px solid rgba(56, 240, 255, 0.16);
    background: rgba(8, 12, 26, 0.8);
  }
  .murphy-action {
    padding: 8px 14px;
    border: 1px solid rgba(56, 240, 255, 0.24);
    background:
      linear-gradient(135deg, rgba(8, 12, 28, 0.96) 0%, rgba(14, 22, 42, 0.92) 100%);
    box-shadow:
      3px 3px 0 rgba(255, 47, 179, 0.16),
      -1px -1px 0 rgba(56, 240, 255, 0.12);
    color: var(--text-main);
    cursor: pointer;
    font-family: "Orbitron", "Rajdhani", sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition:
      border-color 0.15s ease,
      box-shadow 0.15s ease,
      transform 0.15s ease;
  }
  .murphy-action:hover {
    border-color: rgba(255, 47, 179, 0.42);
    box-shadow:
      5px 5px 0 rgba(255, 47, 179, 0.24),
      -2px -2px 0 rgba(56, 240, 255, 0.18);
    transform: translateY(-1px);
  }
  .murphy-action:disabled {
    cursor: wait;
    opacity: 0.72;
    box-shadow: none;
    transform: none;
  }
  .murphy-meta {
    color: var(--text-muted);
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  @media (max-width: 1180px) {
    .murphy-shell-header {
      grid-template-columns: 1fr;
      justify-items: stretch;
    }
    .murphy-nav {
      justify-content: flex-start;
    }
    .murphy-tools {
      justify-content: flex-start;
    }
  }
  @media (max-width: 620px) {
    .murphy-shell-header {
      padding: 16px 16px 14px;
      gap: 14px;
    }
    .murphy-brand {
      flex-direction: column;
      gap: 10px;
    }
    .murphy-signature {
      font-size: 28px;
    }
    .murphy-link {
      flex: 1 1 140px;
    }
    .murphy-tools {
      gap: 8px;
    }
  }


  :root {
    --bg: #000; --surface: #0a0a0a; --border: #1a1a2e; --text: #d9f1ff;
    --text-dim: #7b8da6; --brand: #4dc3ff; --good: #4dffb4; --warn: #ffc04d; --bad: #ff5c5c;
    --glow-brand: rgba(77,195,255,0.15); --glow-good: rgba(77,255,180,0.12); --glow-warn: rgba(255,192,77,0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', 'SF Pro Display', -apple-system, sans-serif; }

  /* --- Vision hero --- */
  .vision-hero {
    position: relative;
    padding: 56px 32px 48px;
    max-width: 960px;
    margin: 0 auto;
    text-align: center;
    overflow: hidden;
  }
  .vision-hero::before {
    content: '';
    position: absolute;
    top: -60%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(77,195,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .vision-hero h1 {
    font-size: 40px;
    font-weight: 300;
    letter-spacing: -0.5px;
    color: #fff;
    margin-bottom: 16px;
  }
  .vision-hero h1 span {
    background: linear-gradient(135deg, var(--brand), var(--good));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 600;
  }
  .vision-text {
    color: var(--text-dim);
    font-size: 15px;
    line-height: 1.6;
    max-width: 640px;
    margin: 0 auto;
  }
  .vision-meta {
    margin-top: 20px;
    font-size: 12px;
    color: var(--text-dim);
    opacity: 0.5;
  }

  /* --- Horizon flow --- */
  .horizon-flow {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px 64px;
    position: relative;
  }
  /* Vertical spine */
  .horizon-flow::before {
    content: '';
    position: absolute;
    left: 52px;
    top: 0;
    bottom: 64px;
    width: 1px;
    background: linear-gradient(to bottom, var(--brand), var(--warn), var(--border));
    opacity: 0.4;
  }

  .horizon-group {
    position: relative;
    margin-bottom: 48px;
  }
  .horizon-marker {
    position: relative;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    padding-left: 36px;
  }
  .horizon-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid;
    position: relative;
    flex-shrink: 0;
    box-shadow: 0 0 12px;
  }
  .horizon-dot.now { border-color: var(--brand); box-shadow: 0 0 16px var(--glow-brand); background: rgba(77,195,255,0.2); }
  .horizon-dot.next { border-color: var(--warn); box-shadow: 0 0 16px var(--glow-warn); background: rgba(255,192,77,0.2); }
  .horizon-dot.later { border-color: var(--text-dim); box-shadow: none; background: rgba(123,141,166,0.15); }
  .horizon-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 3px;
  }
  .horizon-title.now { color: var(--brand); }
  .horizon-title.next { color: var(--warn); }
  .horizon-title.later { color: var(--text-dim); }

  /* --- Theme cards --- */
  .themes-container {
    padding-left: 68px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .theme-card {
    background: linear-gradient(135deg, rgba(10,10,20,0.9), rgba(15,15,30,0.7));
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .theme-card:hover {
    border-color: rgba(77,195,255,0.25);
    box-shadow: 0 4px 24px rgba(77,195,255,0.06);
  }
  .theme-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .theme-name {
    font-size: 17px;
    font-weight: 600;
    color: #fff;
  }
  .theme-progress {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .progress-ring {
    width: 28px;
    height: 28px;
    position: relative;
  }
  .progress-ring svg {
    transform: rotate(-90deg);
  }
  .progress-ring .ring-bg {
    fill: none;
    stroke: var(--border);
    stroke-width: 3;
  }
  .progress-ring .ring-fill {
    fill: none;
    stroke: var(--brand);
    stroke-width: 3;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.8s ease;
  }
  .theme-desc {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.5;
    margin-bottom: 16px;
  }

  /* --- Goals --- */
  .goal-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .goal-item {
    background: rgba(255,255,255,0.02);
    border-radius: 8px;
    padding: 14px 16px;
    border-left: 3px solid transparent;
    transition: background 0.2s;
  }
  .goal-item:hover {
    background: rgba(255,255,255,0.04);
  }
  .goal-item.done { border-left-color: var(--good); }
  .goal-item.in_progress { border-left-color: var(--brand); }
  .goal-item.planned { border-left-color: var(--border); }

  .goal-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .goal-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .goal-badge {
    font-size: 10px;
    padding: 2px 10px;
    border-radius: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .goal-badge.done { background: rgba(77,255,180,0.12); color: var(--good); }
  .goal-badge.in_progress { background: rgba(77,195,255,0.12); color: var(--brand); }
  .goal-badge.planned { background: rgba(123,141,166,0.1); color: var(--text-dim); }

  .goal-desc {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.5;
    margin-top: 6px;
  }

  /* --- Milestones as progress chain --- */
  .milestone-chain {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
    align-items: center;
  }
  .ms-node {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    color: var(--text-dim);
    transition: all 0.2s;
  }
  .ms-node:hover {
    background: rgba(255,255,255,0.06);
  }
  .ms-node.done {
    border-color: rgba(77,255,180,0.3);
    color: var(--good);
  }
  .ms-node.done::before {
    content: '¹3';
    font-size: 10px;
  }
  .ms-node.in_progress {
    border-color: rgba(77,195,255,0.3);
    color: var(--brand);
  }
  .ms-node.in_progress::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--brand);
    animation: pulse 1.5s ease infinite;
  }
  .ms-node.planned::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    border: 1px solid var(--text-dim);
  }
  .ms-connector {
    width: 12px;
    height: 1px;
    background: var(--border);
    flex-shrink: 0;
  }
  .ms-ids {
    font-size: 9px;
    opacity: 0.5;
    margin-left: 2px;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  @media (max-width: 700px) {
    .vision-hero { padding: 36px 20px 32px; }
    .vision-hero h1 { font-size: 28px; }
    .horizon-flow { padding: 0 16px 40px; }
    .horizon-flow::before { left: 28px; }
    .horizon-marker { padding-left: 12px; }
    .themes-container { padding-left: 44px; }
    .theme-card { padding: 16px; }
    .milestone-chain { gap: 4px; }
    .ms-connector { width: 6px; }
  }
</style>
</head>

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

(function() {
  document.getElementById('vision-text').textContent = ROADMAP.vision || '';
  var updated = ROADMAP.last_updated || '';
  if (updated) document.getElementById('updated-text').textContent = 'Last updated ' + updated;

  var themes = ROADMAP.themes || [];
  var horizons = ['now', 'next', 'later'];
  var horizonLabels = {now: 'Now', next: 'Next', later: 'Later'};
  var content = document.getElementById('roadmap-content');
  var html = '';

  function goalProgress(goals) {
    var total = 0, done = 0;
    goals.forEach(function(g) {
      (g.milestones || []).forEach(function(m) {
        total++;
        if (m.status === 'done') done++;
      });
    });
    return total > 0 ? Math.round((done / total) * 100) : 0;
  }

  function progressRingSvg(pct) {
    var r = 11, c = 2 * Math.PI * r;
    var offset = c - (pct / 100) * c;
    return '<div class="progress-ring"><svg width="28" height="28" viewBox="0 0 28 28">' +
      '<circle class="ring-bg" cx="14" cy="14" r="' + r + '"/>' +
      '<circle class="ring-fill" cx="14" cy="14" r="' + r + '" ' +
        'stroke-dasharray="' + c.toFixed(1) + '" stroke-dashoffset="' + offset.toFixed(1) + '"/>' +
    '</svg></div>';
  }

  horizons.forEach(function(h) {
    var themeCards = [];
    themes.forEach(function(theme) {
      var goals = (theme.goals || []).filter(function(g) { return g.horizon === h; });
      if (goals.length === 0) return;
      var pct = goalProgress(goals);

      var goalsHtml = goals.map(function(goal) {
        var msNodes = (goal.milestones || []).map(function(m, i) {
          var ids = (m.backlog_ids || []).length > 0
            ? '<span class="ms-ids">' + m.backlog_ids.map(esc).join(', ') + '</span>'
            : '';
          var connector = i > 0 ? '<span class="ms-connector"></span>' : '';
          return connector + '<span class="ms-node ' + esc(m.status) + '">' + esc(m.name) + ids + '</span>';
        }).join('');

        return '<div class="goal-item ' + esc(goal.status) + '">' +
          '<div class="goal-top">' +
            '<span class="goal-name">' + esc(goal.name) + '</span>' +
            '<span class="goal-badge ' + esc(goal.status) + '">' + esc(goal.status.replace(/_/g, ' ')) + '</span>' +
          '</div>' +
          '<div class="goal-desc">' + esc(goal.description || '') + '</div>' +
          (msNodes ? '<div class="milestone-chain">' + msNodes + '</div>' : '') +
        '</div>';
      }).join('');

      themeCards.push(
        '<div class="theme-card">' +
          '<div class="theme-header">' +
            '<span class="theme-name">' + esc(theme.name) + '</span>' +
            '<span class="theme-progress">' + progressRingSvg(pct) + pct + '%</span>' +
          '</div>' +
          '<div class="theme-desc">' + esc(theme.description || '') + '</div>' +
          '<div class="goal-list">' + goalsHtml + '</div>' +
        '</div>'
      );
    });
    if (themeCards.length === 0) return;
    html += '<div class="horizon-group">' +
      '<div class="horizon-marker">' +
        '<span class="horizon-dot ' + h + '"></span>' +
        '<span class="horizon-title ' + h + '">' + horizonLabels[h] + '</span>' +
      '</div>' +
      '<div class="themes-container">' + themeCards.join('') + '</div>' +
    '</div>';
  });

  content.innerHTML = html;
})();
