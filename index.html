<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Monitor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
  :root {
    --bg-base: #050816;
    --bg-surface: rgba(20, 26, 46, 0.92);
    --bg-surface-2: rgba(30, 38, 64, 0.95);
    --bg-border: #2a2f3e;
    --text-main: #e8ebf4;
    --text-muted: #8f98b3;
    --text-dim: #657096;
    --brand: #6da4ff;
    --good: #4ade80;
    --warn: #facc15;
    --bad: #f87171;
    --stack-queued-border: #49669f;
    --stack-active-border: #2f8f79;
    --stack-incomplete-border: #b58544;
    --stack-finished-border: #6f8fd7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
          background: radial-gradient(circle at 10% 10%, #111f47 0%, transparent 38%),
                      radial-gradient(circle at 90% 0%, #1f2f5e 0%, transparent 32%),
                      linear-gradient(150deg, #050816 0%, #080c1f 35%, #0b1228 100%);
          color: var(--text-main); font-size: 14px; min-height: 100vh; position: relative; overflow-x: hidden; }
  body::before, body::after {
    content: "";
    position: fixed;
    width: 520px;
    height: 520px;
    filter: blur(64px);
    opacity: 0.28;
    z-index: 0;
    pointer-events: none;
  }
  body::before {
    top: -220px;
    left: -120px;
    background: #5fa8ff;
  }
  body::after {
    right: -220px;
    bottom: -280px;
    background: #2ea48f;
  }

  header { display: flex; align-items: center; gap: 12px; padding: 14px 20px;
            background: rgba(13, 18, 35, 0.88); border-bottom: 1px solid var(--bg-border); flex-wrap: wrap;
            backdrop-filter: blur(8px); position: sticky; top: 0; z-index: 2; }
  header h1 { font-size: 16px; font-weight: 600; color: #fff; }
  #last-updated { margin-left: auto; color: var(--text-muted); font-size: 12px; }

  .pill { display: inline-block; padding: 3px 10px; border-radius: 20px;
           font-size: 12px; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase; }
  .pill-running  { background: #1a4731; color: var(--good); }
  .pill-sleeping { background: #2a2f3e; color: var(--text-muted); }
  .pill-pending  { background: #3b2f05; color: var(--warn); }
  .pill-retrying { background: #3b1a1a; color: var(--bad); }
  .pill-unknown  { background: #2a2f3e; color: #aaa; }
  .pill-done     { background: #1a4731; color: var(--good); }
  .pill-inprog   { background: #1a2f47; color: #60a5fa; }
  .pill-waiting  { background: #3b2f05; color: var(--warn); }
  .pill-queued   { background: #2a2f3e; color: #aaa; }
  .pill-failed   { background: #3b1a1a; color: var(--bad); }

  main { padding: 16px 20px 24px; display: grid; gap: 16px; max-width: 1450px; position: relative; z-index: 1; }
  .card { background: var(--bg-surface); border: 1px solid var(--bg-border); border-radius: 12px; overflow: hidden;
           box-shadow: 0 16px 34px rgba(3, 6, 20, 0.3); animation: riseIn 320ms ease-out both; }
  .card-header { padding: 10px 16px; background: var(--bg-surface-2); border-bottom: 1px solid var(--bg-border);
                  font-size: 11px; font-weight: 700; text-transform: uppercase;
                  letter-spacing: 0.8px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
  .card-body { padding: 14px 16px; }

  .hb-grid  { display: flex; gap: 24px; flex-wrap: wrap; align-items: center; }
  .hb-item  { display: flex; flex-direction: column; gap: 2px; }
  .hb-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
  .hb-val   { font-size: 14px; color: var(--text-main); font-weight: 500; }
  .hb-note { margin-top: 10px; color: #98a5cb; font-size: 12px; line-height: 1.45; }
  .hb-note-warn { color: #facc15; }

  .system-grid { display: grid; gap: 10px; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
  .sys-item { border: 1px solid #2e3651; border-radius: 8px; background: rgba(11, 15, 30, 0.8); padding: 10px 12px; }
  .sys-label { color: var(--text-dim); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.7px; }
  .sys-val { color: var(--text-main); font-size: 13px; font-weight: 500; margin-top: 5px; word-break: break-word; }

  .stack-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
  .stack-col { border: 1px solid #2d3550; border-radius: 10px; background: rgba(12, 18, 35, 0.82); display: flex;
                flex-direction: column; min-height: 220px; }
  .stack-head { padding: 9px 10px; border-bottom: 1px solid #2d3550; display: flex; align-items: center; justify-content: space-between;
                 font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.7px; font-weight: 700; }
  .stack-count { background: rgba(19, 26, 46, 0.75); border-radius: 999px; padding: 1px 8px; color: #dce2f3; font-size: 11px; }
  .stack-list { display: grid; gap: 8px; padding: 10px; align-content: start; max-height: 300px; overflow-y: auto; }
  .stack-item { border: 1px solid #2f3752; border-radius: 8px; padding: 8px; background: rgba(17, 24, 45, 0.92); }
  .stack-item-title { font-size: 12px; line-height: 1.4; color: #dce1f0; margin-bottom: 6px;
                       display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .stack-item-meta { display: flex; justify-content: space-between; gap: 10px; font-size: 11px; color: var(--text-dim); }
  .stack-empty { color: #556181; font-style: italic; font-size: 12px; padding: 10px; }
  .stack-col.stack-queued { border-color: var(--stack-queued-border); background: linear-gradient(180deg, rgba(58, 78, 128, 0.35) 0%, rgba(14, 21, 39, 0.9) 100%); }
  .stack-col.stack-active { border-color: var(--stack-active-border); background: linear-gradient(180deg, rgba(45, 112, 99, 0.35) 0%, rgba(13, 24, 33, 0.9) 100%); }
  .stack-col.stack-incomplete { border-color: var(--stack-incomplete-border); background: linear-gradient(180deg, rgba(135, 94, 44, 0.35) 0%, rgba(28, 20, 18, 0.9) 100%); }
  .stack-col.stack-finished { border-color: var(--stack-finished-border); background: linear-gradient(180deg, rgba(90, 114, 179, 0.34) 0%, rgba(14, 19, 38, 0.9) 100%); }
  .stack-col.stack-queued .stack-head { border-bottom-color: rgba(73, 102, 159, 0.45); color: #d5e0ff; }
  .stack-col.stack-active .stack-head { border-bottom-color: rgba(47, 143, 121, 0.45); color: #d7fff2; }
  .stack-col.stack-incomplete .stack-head { border-bottom-color: rgba(181, 133, 68, 0.45); color: #ffe7c7; }
  .stack-col.stack-finished .stack-head { border-bottom-color: rgba(111, 143, 215, 0.45); color: #dce5ff; }

  .task-text { line-height: 1.5; color: #c0c8e0; max-height: 88px; overflow-y: auto;
                word-break: break-word; margin-bottom: 10px; white-space: pre-wrap; }
  .task-meta { display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; color: var(--text-muted); }
  .task-meta span b { color: #aaa; }

  .tab-bar { display: flex; border-bottom: 1px solid #2a2f3e; }
  .tab-btn  { padding: 8px 16px; font-size: 12px; font-weight: 600; cursor: pointer;
               background: none; border: none; color: var(--text-dim); border-bottom: 2px solid transparent; }
  .tab-btn:hover  { color: #aaa; }
  .tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }
  .tab-content        { display: none; }
  .tab-content.active { display: block; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 10px; font-size: 11px; color: #666;
        text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #2a2f3e; }
  td { padding: 9px 10px; border-bottom: 1px solid #1e2235; vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #1e2235; }
  .cell-text { max-width: 420px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #c0c8e0; }
  .cell-user { color: var(--text-muted); white-space: nowrap; }
  .cell-age  { color: var(--text-dim); white-space: nowrap; text-align: right; }
  .empty-row { color: #555; font-style: italic; padding: 16px 10px; }

  #log-box { font-family: "IBM Plex Mono", "SF Mono", "Fira Code", monospace; font-size: 11.5px;
              background: #0d1017; border-radius: 4px; padding: 10px 12px;
              height: 260px; overflow-y: auto; line-height: 1.55;
              white-space: pre-wrap; word-break: break-all; }
  .log-error   { color: #f87171; }
  .log-start   { color: #60a5fa; }
  .log-idle    { color: #555; }
  .log-enq     { color: #a78bfa; }
  .log-human   { color: #facc15; }
  .log-maint   { color: #34d399; }
  .log-default { color: #888; }

  .md-pre { font-family: "IBM Plex Mono", "SF Mono", "Fira Code", monospace; font-size: 12px;
             white-space: pre-wrap; word-break: break-word; color: #aaa;
             background: #0d1017; padding: 12px; border-radius: 4px;
             max-height: 300px; overflow-y: auto; line-height: 1.6; }
  details summary { cursor: pointer; padding: 10px 16px; font-size: 11px; font-weight: 700;
                     text-transform: uppercase; letter-spacing: 0.8px; color: #888;
                     background: #1e2235; border-bottom: 1px solid #2a2f3e; list-style: none; }
  details summary::-webkit-details-marker { display: none; }
  details summary::before { content: "▶ "; }
  details[open] summary::before { content: "▼ "; }

  #refresh-btn { padding: 5px 12px; border-radius: 6px; border: 1px solid #2a2f3e;
                  background: #1e2235; color: #aaa; font-size: 12px; cursor: pointer; }
  #refresh-btn:hover { background: #2a2f3e; color: #e0e0e0; }

  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot-green  { background: #4ade80; box-shadow: 0 0 6px #4ade80aa; }
  .dot-yellow { background: #facc15; box-shadow: 0 0 6px #facc15aa; }
  .dot-red    { background: #f87171; box-shadow: 0 0 6px #f87171aa; }
  .dot-grey   { background: #555; }
  .section-note { margin-top: 10px; color: #93a0c6; font-size: 12px; line-height: 1.45; }
  .gpu-layout { display: grid; gap: 10px; }
  .gpu-grid { display: grid; gap: 10px; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); }
  .gpu-item { border: 1px solid #354066; border-radius: 8px; background: rgba(13, 18, 36, 0.86); padding: 10px 12px; }
  .gpu-title { color: #d4ddfb; font-size: 11px; font-weight: 700; letter-spacing: 0.4px; text-transform: uppercase; margin-bottom: 7px; }
  .gpu-val { color: #dfe6ff; font-size: 12.5px; line-height: 1.45; }
  .queue-grid { display: grid; gap: 8px; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
  .visibility-list { list-style: none; display: grid; gap: 6px; }
  .visibility-list li { color: #c7d1ef; font-size: 12px; line-height: 1.5; }
  .visibility-list strong { color: #9fb2e9; font-weight: 600; }

  @keyframes riseIn {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 1160px) {
    .stack-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }
  @media (max-width: 760px) {
    main { padding: 14px; gap: 12px; }
    .hb-grid { gap: 12px; }
    .stack-grid { grid-template-columns: 1fr; }
    .tab-bar { overflow-x: auto; }
    .tab-btn { flex: 1 0 auto; }
  }
</style>
</head>
<body>
<header>
  <h1>Agent Monitor</h1>
  <span id="status-pill" class="pill pill-unknown">—</span>
  <button id="refresh-btn">↻ Refresh</button>
  <span id="last-updated"></span>
</header>

<main>
  <div class="card">
    <div class="card-header">Supervisor</div>
    <div class="card-body">
      <div class="hb-grid" id="hb-grid"></div>
      <div class="hb-note" id="hb-note"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-header"><span class="dot" id="active-dot"></span>Active Task</div>
    <div class="card-body" id="active-body"></div>
  </div>

  <div class="card">
    <div class="card-header">Task Stacks</div>
    <div class="card-body"><div class="stack-grid" id="stack-grid"></div></div>
  </div>

  <div class="card">
    <div class="card-header">Task Queue</div>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('queued',this)">Queued <span id="cnt-queued"></span></button>
      <button class="tab-btn" onclick="switchTab('active',this)">Active <span id="cnt-active"></span></button>
      <button class="tab-btn" onclick="switchTab('incomplete',this)">Incomplete <span id="cnt-incomplete"></span></button>
      <button class="tab-btn" onclick="switchTab('finished',this)">Finished (last 10) <span id="cnt-finished"></span></button>
    </div>
    <div id="tab-queued"     class="tab-content active"><table id="tbl-queued"></table></div>
    <div id="tab-active"     class="tab-content"><table id="tbl-active"></table></div>
    <div id="tab-incomplete" class="tab-content"><table id="tbl-incomplete"></table></div>
    <div id="tab-finished"   class="tab-content"><table id="tbl-finished"></table></div>
  </div>

  <div class="card">
    <div class="card-header">System Snapshot</div>
    <div class="card-body"><div class="system-grid" id="system-grid"></div></div>
  </div>

  <div class="card">
    <div class="card-header">GPU Node + Slurm Queue</div>
    <div class="card-body">
      <div class="gpu-layout" id="gpu-body"></div>
      <div class="section-note" id="gpu-note"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">Recent Log Events</div>
    <div class="card-body" style="padding:10px 12px"><div id="log-box"></div></div>
  </div>

  <div class="card">
    <div class="card-header">Visibility + Permissions</div>
    <div class="card-body"><ul class="visibility-list" id="visibility-list"></ul></div>
  </div>

  <div class="card">
    <details>
      <summary>Long-Term Goals</summary>
      <div class="card-body"><pre class="md-pre" id="goals-pre"></pre></div>
    </details>
  </div>
  <div class="card">
    <details>
      <summary>Agent Memory</summary>
      <div class="card-body"><pre class="md-pre" id="memory-pre"></pre></div>
    </details>
  </div>
</main>

 "1771580731.031149", "status": "done", "summary": "Synced project codebases to GitHub SSH remotes, opened PR-based syncs with @codex for three project repos, verified MCP repos are aligned, and checkpointed coo…", "summary_preview": "Synced project codebases to GitHub SSH remotes, opened PR-based syncs with @codex for three project repos, verified MCP repos are aligned, and checkpointed coo…", "mention_text": "(hidden in public snapshot)", "created_ts": "1771580731.031149", "last_update_ts": "1771616326.501596", "task_type": "slack_mention", "source": {"user_name": "wangzhi0467", "time_iso": "2026-02-20T09:45:31Z"}}, "1771553355.096239": {"mention_ts": "1771553355.096239", "thread_ts": "1771553355.096239", "status": "done", "summary": "Confirmed waiting_human incomplete retention is enforced at MAX_INCOMPLETE_RETENTION (default 2592000s/30d), kept existing patch, and closed task after human c…", "summary_preview": "Confirmed waiting_human incomplete retention is enforced at MAX_INCOMPLETE_RETENTION (default 2592000s/30d), kept existing patch, and closed task after human c…", "mention_text": "(hidden in public snapshot)", "created_ts": "1771553355.096239", "last_update_ts": "1771584355.289691", "task_type": "slack_mention", "source": {"user_name": "wangzhi0467", "time_iso": "2026-02-20T02:09:15Z"}}}}, "log_tail": ["(hidden in public snapshot)"], "goals_md": "(hidden in public snapshot)", "memory_md": "(hidden in public snapshot)", "visibility": {"mode": "public_snapshot", "audience": "Anyone with the GitHub Pages URL.", "goals_memory_access": "Hidden in public snapshot export.", "task_text_access": "Compact summary previews only.", "log_access": "Hidden in public snapshot export.", "source_code_exposure": "No repository files are published by this dashboard output."}, "server_time_utc": "2026-02-22T20:35:47Z"};
const API_STATUS_PATH = "status.json";

const STATUS_STYLES = {
  running_session:    ['pill-running',  'dot-green',  'Running'],
  sleeping:           ['pill-sleeping', 'dot-grey',   'Sleeping'],
  sleeping_pending:   ['pill-pending',  'dot-yellow', 'Waiting (human)'],
  retrying_transient: ['pill-retrying', 'dot-red',    'Retrying'],
  starting:           ['pill-sleeping', 'dot-grey',   'Starting'],
};
const STACK_STYLE_BY_BUCKET = {
  queued: 'stack-queued',
  active: 'stack-active',
  incomplete: 'stack-incomplete',
  finished: 'stack-finished',
};

function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}
function ageSeconds(ts) {
  if (!ts) return null;
  const sec = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
  return sec < 0 ? 0 : sec;
}
function age(ts) {
  const d = ageSeconds(ts);
  if (d == null) return '—';
  if (d < 60)   return d + 's';
  if (d < 3600) return Math.floor(d/60) + 'm ' + (d%60) + 's';
  return Math.floor(d/3600) + 'h ' + Math.floor((d%3600)/60) + 'm';
}
function taskAge(ts) {
  if (!ts) return '—';
  const d = Math.floor((Date.now() - parseFloat(ts)*1000) / 1000);
  if (d < 0)     return '0s';
  if (d < 60)    return d + 's';
  if (d < 3600)  return Math.floor(d/60) + 'm';
  if (d < 86400) return Math.floor(d/3600) + 'h';
  return Math.floor(d/86400) + 'd';
}
function formatBytes(v) {
  if (v == null || Number.isNaN(v)) return '—';
  const n = Number(v);
  if (n < 1024) return n + ' B';
  const units = ['KB', 'MB', 'GB', 'TB'];
  let value = n / 1024;
  let idx = 0;
  while (value >= 1024 && idx < units.length - 1) {
    value /= 1024;
    idx += 1;
  }
  return `${value.toFixed(value >= 10 ? 1 : 2)} ${units[idx]}`;
}
function sortTasks(items) {
  return [...items].sort((a, b) => {
    const aTs = parseFloat(a.last_update_ts || a.created_ts || '0');
    const bTs = parseFloat(b.last_update_ts || b.created_ts || '0');
    return bTs - aTs;
  });
}
function rawTaskText(t) {
  return String(
    t.summary_preview ??
    t.summary ??
    t.mention_text ??
    '(no text)'
  ).replace(/\s+/g, ' ').trim();
}
function compactTaskText(t, limit=90) {
  const raw = rawTaskText(t);
  if (raw.length <= limit) return raw;
  return raw.substring(0, Math.max(limit - 1, 0)) + '…';
}
function statusPill(s) {
  const m = {done:'pill-done',in_progress:'pill-inprog',waiting_human:'pill-waiting',queued:'pill-queued',failed:'pill-failed'};
  return `<span class="pill ${m[s]||'pill-unknown'}">${esc(s)||'?'}</span>`;
}
function badge(n) {
  return n ? `<span style="background:#2a2f3e;border-radius:10px;padding:1px 6px;font-size:11px">${n}</span>` : '';
}
function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}
function logClass(l) {
  if (/error|failure|failed/.test(l)) return 'log-error';
  if (/session_start|runner_start/.test(l)) return 'log-start';
  if (/session_idle|no_dispatchable/.test(l)) return 'log-idle';
  if (/enqueued|mention_poll/.test(l)) return 'log-enq';
  if (/waiting_human/.test(l)) return 'log-human';
  if (/maintenance|reflect/.test(l)) return 'log-maint';
  return 'log-default';
}
function formatTime(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  if (Number.isNaN(d.getTime())) return String(ts);
  return d.toLocaleString();
}
function heartbeatFreshness(ageSec) {
  if (ageSec == null) return 'unknown';
  if (ageSec <= 15) return 'fresh';
  if (ageSec <= 60) return 'delayed';
  return 'stale';
}

function render(data) {
  const hb    = data.heartbeat;
  const tasks = data.tasks || {};

  // Status pill
  const [pillCls, dotCls, label] = (hb && STATUS_STYLES[hb.status]) || ['pill-unknown','dot-grey','?'];
  const pillEl = document.getElementById('status-pill');
  pillEl.className = 'pill ' + pillCls;
  pillEl.textContent = label;

  // Supervisor stats
  const hbGridEl = document.getElementById('hb-grid');
  const hbNoteEl = document.getElementById('hb-note');
  if (hb) {
    const hbAgeSec = ageSeconds(hb.last_updated_utc);
    const freshness = heartbeatFreshness(hbAgeSec);
    hbGridEl.innerHTML = [
      ['Loop',             hb.loop_count ?? '—'],
      ['PID',              hb.pid ?? '—'],
      ['Last exit',        hb.last_exit_code ?? '—'],
      ['Failure kind',     hb.last_failure_kind || '—'],
      ['Retry attempt',    hb.transient_retry_attempt ?? '—'],
      ['Backoff',          hb.pending_backoff_sec != null ? hb.pending_backoff_sec + 's' : '—'],
      ['Next sleep',       hb.next_sleep_sec != null ? hb.next_sleep_sec + 's' : '—'],
      ['Pending decision', hb.pending_decision ? '⚠ Yes' : 'No'],
      ['Heartbeat age',    hbAgeSec == null ? '—' : `${age(hb.last_updated_utc)} (${freshness})`],
      ['Heartbeat updated', formatTime(hb.last_updated_utc)],
    ].map(([l, v]) =>
      `<div class="hb-item"><span class="hb-label">${l}</span><span class="hb-val">${esc(v)}</span></div>`
    ).join('');
    hbNoteEl.textContent =
      hbAgeSec == null
        ? 'Heartbeat age is unavailable because last_updated_utc is missing.'
        : `Heartbeat age = seconds since supervisor last wrote .agent/heartbeat.json (${hbAgeSec}s).`;
    hbNoteEl.className = 'hb-note' + ((hbAgeSec != null && hbAgeSec > 60) ? ' hb-note-warn' : '');
  } else {
    hbGridEl.innerHTML = '<div class="hb-item"><span class="hb-label">State</span><span class="hb-val">No heartbeat data</span></div>';
    hbNoteEl.textContent = 'Heartbeat age is the elapsed time since .agent/heartbeat.json was last refreshed by the supervisor loop.';
    hbNoteEl.className = 'hb-note';
  }

  // Active task
  const active = Object.values(tasks.active || {});
  document.getElementById('active-dot').className = 'dot ' + (active.length ? 'dot-green' : 'dot-grey');
  const abody = document.getElementById('active-body');
  if (active.length) {
    const t = active[0];
    const txt = compactTaskText(t, 220);
    abody.innerHTML = `
      <div class="task-text">${esc(txt)}</div>
      <div class="task-meta">
        ${statusPill(t.status)}
        <span><b>Requester:</b> ${esc(t.source && t.source.user_name || '—')}</span>
        <span><b>Age:</b> ${taskAge(t.created_ts)}</span>
        <span><b>Thread:</b> ${esc(t.thread_ts || '—')}</span>
      </div>`;
  } else {
    abody.innerHTML = '<p style="color:#555;font-style:italic">No active task</p>';
  }

  // Task stacks
  const stackDefs = [
    ['queued', 'Queued'],
    ['active', 'Active'],
    ['incomplete', 'Incomplete'],
    ['finished', 'Finished'],
  ];
  const stackGrid = document.getElementById('stack-grid');
  stackGrid.innerHTML = stackDefs.map(([bucket, label]) => {
    const items = sortTasks(Object.values(tasks[bucket] || {}));
    const listHtml = items.length
      ? items.slice(0, 12).map(t => `
          <div class="stack-item">
            <div class="stack-item-title">${esc(compactTaskText(t, 88))}</div>
            <div class="stack-item-meta">
              <span>${esc((t.source && t.source.user_name) || '—')}</span>
              <span>${taskAge(t.created_ts)}</span>
            </div>
          </div>
        `).join('')
      : '<div class="stack-empty">No tasks</div>';
    return `
      <section class="stack-col ${STACK_STYLE_BY_BUCKET[bucket] || ''}">
        <div class="stack-head">
          <span>${esc(label)}</span>
          <span class="stack-count">${items.length}</span>
        </div>
        <div class="stack-list">${listHtml}</div>
      </section>
    `;
  }).join('');

  // Task tables
  ['queued', 'active', 'incomplete', 'finished'].forEach(b => {
    const items = sortTasks(Object.values(tasks[b] || {}));
    document.getElementById('cnt-' + b).innerHTML = badge(items.length);
    const tbl = document.getElementById('tbl-' + b);
    if (!items.length) {
      tbl.innerHTML = '<tr><td class="empty-row" colspan="4">No tasks</td></tr>';
      return;
    }
    const head = '<thead><tr><th>Task / Summary</th><th>Status</th><th>Requester</th><th style="text-align:right">Age</th></tr></thead>';
    tbl.innerHTML = head + '<tbody>' + items.map(t => {
      const txt = compactTaskText(t, 96);
      return `<tr>
        <td class="cell-text">${esc(txt)}</td>
        <td>${statusPill(t.status)}</td>
        <td class="cell-user">${esc(t.source && t.source.user_name || '—')}</td>
        <td class="cell-age">${taskAge(t.created_ts)}</td>
      </tr>`;
    }).join('') + '</tbody>';
  });

  // System snapshot
  const sys = data.system || {};
  const sysRows = [
    ['Host',              sys.hostname || '—'],
    ['Platform',          sys.platform || '—'],
    ['Python',            sys.python_version || '—'],
    ['CPU cores',         sys.cpu_count != null ? sys.cpu_count : '—'],
    ['Load avg 1/5/15m',  sys.load_avg ? `${sys.load_avg.one} / ${sys.load_avg.five} / ${sys.load_avg.fifteen}` : '—'],
    ['Memory total',      formatBytes(sys.memory_total_bytes)],
    ['Disk free',         formatBytes(sys.disk_free_bytes)],
    ['Disk used',         formatBytes(sys.disk_used_bytes)],
    ['Runner log size',   formatBytes(sys.runner_log_size_bytes)],
    ['Dashboard uptime',  age(sys.dashboard_started_utc)],
    ['Dashboard PID',     sys.dashboard_pid != null ? sys.dashboard_pid : '—'],
    ['Local IPs',         Array.isArray(sys.local_ips) && sys.local_ips.length ? sys.local_ips.join(', ') : '—'],
  ];
  document.getElementById('system-grid').innerHTML = sysRows.map(([l, v]) =>
    `<div class="sys-item"><div class="sys-label">${esc(l)}</div><div class="sys-val">${esc(v)}</div></div>`
  ).join('');

  // GPU + Slurm snapshot (optional)
  const gpu = data.gpu || {};
  const gpuBody = document.getElementById('gpu-body');
  const gpuNote = document.getElementById('gpu-note');
  if (!gpu.enabled) {
    gpuBody.innerHTML = `
      <div class="gpu-item">
        <div class="gpu-title">Status</div>
        <div class="gpu-val">Disabled by default to avoid intrusive remote polling.</div>
      </div>`;
    gpuNote.textContent = 'Enable with --gpu-monitor on. Collection is cached and low-frequency.';
    gpuNote.className = 'section-note';
  } else {
    const queue = gpu.queue || {};
    const queueRows = [
      ['Total jobs', queue.total_jobs ?? '—'],
      ['Running', queue.running_jobs ?? '—'],
      ['Pending', queue.pending_jobs ?? '—'],
      ['My jobs', queue.my_jobs ?? '—'],
    ];
    const queueHtml = queueRows.map(([labelText, valueText]) => `
      <div class="gpu-item">
        <div class="gpu-title">${esc(labelText)}</div>
        <div class="gpu-val">${esc(valueText)}</div>
      </div>
    `).join('');

    const gpus = Array.isArray(gpu.gpus) ? gpu.gpus : [];
    const gpuCards = gpus.length
      ? gpus.map(row => `
          <div class="gpu-item">
            <div class="gpu-title">GPU ${esc(row.index ?? '?')} · ${esc(row.name || 'Unknown')}</div>
            <div class="gpu-val">Utilization: ${esc(row.utilization_gpu_pct != null ? row.utilization_gpu_pct + '%' : '—')}</div>
            <div class="gpu-val">Memory: ${esc(row.memory_used_mb != null ? row.memory_used_mb : '—')} / ${esc(row.memory_total_mb != null ? row.memory_total_mb : '—')} MB</div>
            <div class="gpu-val">Temperature: ${esc(row.temperature_c != null ? row.temperature_c + '°C' : '—')}</div>
          </div>
        `).join('')
      : '<div class="gpu-item"><div class="gpu-title">GPU Data</div><div class="gpu-val">No GPU rows returned.</div></div>';

    gpuBody.innerHTML = `
      <div class="queue-grid">${queueHtml}</div>
      <div class="gpu-grid">${gpuCards}</div>
    `;

    const noteParts = [
      `Node: ${gpu.node_alias || '—'}`,
      `Last check: ${formatTime(gpu.checked_at_utc)}`,
    ];
    if (gpu.cache_age_sec != null) {
      noteParts.push(`cache age ${gpu.cache_age_sec}s`);
    }
    if (gpu.note) {
      noteParts.push(String(gpu.note));
    }
    gpuNote.textContent = noteParts.join(' · ');
    gpuNote.className = 'section-note' + ((gpu.status === 'ok' || gpu.status === 'partial') ? '' : ' hb-note-warn');
  }

  // Log tail
  const logEl = document.getElementById('log-box');
  if (data.log_tail && data.log_tail.length) {
    logEl.innerHTML = data.log_tail.map(l =>
      `<span class="${logClass(l)}">${esc(l)}</span>`
    ).join('\n');
    logEl.scrollTop = logEl.scrollHeight;
  } else {
    logEl.textContent = '(no log data)';
  }

  // Goals & memory
  document.getElementById('goals-pre').textContent  = data.goals_md  || '(not found)';
  document.getElementById('memory-pre').textContent = data.memory_md || '(not found)';

  // Visibility + permissions
  const vis = data.visibility || {};
  const visRows = [
    ['Audience', vis.audience || '—'],
    ['Goals/Memory', vis.goals_memory_access || '—'],
    ['Task Text', vis.task_text_access || '—'],
    ['Logs', vis.log_access || '—'],
    ['Source-Code Exposure', vis.source_code_exposure || '—'],
  ];
  document.getElementById('visibility-list').innerHTML = visRows.map(([l, v]) =>
    `<li><strong>${esc(l)}:</strong> ${esc(v)}</li>`
  ).join('');

  // Timestamp
  const src = data.server_time_utc ? new Date(data.server_time_utc).toLocaleTimeString() : '?';
  const mode = location.protocol === 'file:' ? 'file · Live Preview' : 'http · live poll';
  document.getElementById('last-updated').textContent = `Updated ${src} (${mode})`;
}

// Render immediately from embedded data (instant, no network round-trip)
render(INITIAL_DATA);

// Over HTTP: also poll /api/status every 5s for live DOM updates without page reload
function fetchAndRender() {
  if (!API_STATUS_PATH) return;
  fetch(API_STATUS_PATH)
    .then(r => r.json())
    .then(render)
    .catch(() => {
      document.getElementById('last-updated').textContent = 'Poll failed — retrying…';
    });
}

const canPoll = Boolean(API_STATUS_PATH) && location.protocol !== 'file:';
document.getElementById('refresh-btn').onclick = canPoll
  ? fetchAndRender
  : () => location.reload();

if (canPoll) {
  setInterval(fetchAndRender, 5000);
}
</script>
</body>
</html>
