<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Murphy Roadmap</title>
<style>

  .murphy-shell-header {
    position: sticky;
    top: 0;
    z-index: 8;
    display: grid;
    grid-template-columns: minmax(240px, 1.05fr) minmax(280px, 1.3fr) auto;
    gap: 16px 20px;
    align-items: center;
    padding: 18px 24px 16px;
    background:
      linear-gradient(135deg, rgba(5, 9, 24, 0.98) 0%, rgba(9, 16, 38, 0.96) 52%, rgba(19, 12, 34, 0.98) 100%);
    border-bottom: 1px solid rgba(56, 240, 255, 0.28);
    box-shadow:
      0 18px 48px rgba(0, 0, 0, 0.4),
      inset 0 -1px 0 rgba(255, 47, 179, 0.16);
  }
  .murphy-shell-header::after {
    content: "";
    position: absolute;
    inset: auto 24px 0;
    height: 1px;
    background: linear-gradient(
      90deg,
      rgba(56, 240, 255, 0) 0%,
      rgba(56, 240, 255, 0.68) 24%,
      rgba(255, 47, 179, 0.52) 76%,
      rgba(255, 47, 179, 0) 100%
    );
  }
  .murphy-brand {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    min-width: 0;
  }
  .murphy-signature {
    flex: 0 0 auto;
    margin-top: -2px;
    color: #f8fbff;
    text-decoration: none;
    font-family: "Playfair Display", serif;
    font-size: clamp(30px, 3vw, 42px);
    font-style: italic;
    font-weight: 700;
    letter-spacing: 0.04em;
    line-height: 0.88;
    text-shadow:
      3px 0 var(--brand-alt),
      -3px 0 var(--brand),
      0 0 18px rgba(56, 240, 255, 0.18);
  }
  .murphy-context {
    min-width: 0;
    display: grid;
    gap: 6px;
  }
  .murphy-kicker {
    color: var(--brand);
    font-family: "Orbitron", "Rajdhani", sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .murphy-title-row {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 8px;
  }
  .murphy-surface {
    color: #f4fbff;
    font-family: "Orbitron", "Rajdhani", sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .murphy-divider {
    color: rgba(56, 240, 255, 0.55);
    font-size: 16px;
  }
  .murphy-note {
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.35;
  }
  .murphy-nav {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
  }
  .murphy-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 38px;
    padding: 8px 12px;
    border: 1px solid rgba(56, 240, 255, 0.2);
    background:
      linear-gradient(135deg, rgba(5, 9, 24, 0.94) 0%, rgba(12, 20, 42, 0.92) 100%);
    box-shadow:
      3px 3px 0 rgba(255, 47, 179, 0.16),
      -1px -1px 0 rgba(56, 240, 255, 0.12);
    color: var(--text-main);
    text-decoration: none;
    font-family: "Orbitron", "Rajdhani", sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition:
      border-color 0.15s ease,
      box-shadow 0.15s ease,
      transform 0.15s ease;
  }
  .murphy-link:hover {
    border-color: rgba(255, 47, 179, 0.42);
    box-shadow:
      5px 5px 0 rgba(255, 47, 179, 0.24),
      -2px -2px 0 rgba(56, 240, 255, 0.18);
    transform: translateY(-1px);
  }
  .murphy-link.current,
  .murphy-link[aria-current="page"] {
    border-color: rgba(56, 240, 255, 0.58);
    background:
      linear-gradient(135deg, rgba(16, 31, 58, 0.98) 0%, rgba(38, 18, 58, 0.94) 100%);
    box-shadow:
      4px 4px 0 rgba(255, 47, 179, 0.28),
      -2px -2px 0 rgba(56, 240, 255, 0.22);
  }
  .murphy-tools {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: flex-end;
    gap: 10px;
  }
  .murphy-status {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    border: 1px solid rgba(56, 240, 255, 0.16);
    background: rgba(8, 12, 26, 0.8);
  }
  .murphy-action {
    padding: 8px 14px;
    border: 1px solid rgba(56, 240, 255, 0.24);
    background:
      linear-gradient(135deg, rgba(8, 12, 28, 0.96) 0%, rgba(14, 22, 42, 0.92) 100%);
    box-shadow:
      3px 3px 0 rgba(255, 47, 179, 0.16),
      -1px -1px 0 rgba(56, 240, 255, 0.12);
    color: var(--text-main);
    cursor: pointer;
    font-family: "Orbitron", "Rajdhani", sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition:
      border-color 0.15s ease,
      box-shadow 0.15s ease,
      transform 0.15s ease;
  }
  .murphy-action:hover {
    border-color: rgba(255, 47, 179, 0.42);
    box-shadow:
      5px 5px 0 rgba(255, 47, 179, 0.24),
      -2px -2px 0 rgba(56, 240, 255, 0.18);
    transform: translateY(-1px);
  }
  .murphy-action:disabled {
    cursor: wait;
    opacity: 0.72;
    box-shadow: none;
    transform: none;
  }
  .murphy-meta {
    color: var(--text-muted);
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  @media (max-width: 1180px) {
    .murphy-shell-header {
      grid-template-columns: 1fr;
      justify-items: stretch;
    }
    .murphy-nav {
      justify-content: flex-start;
    }
    .murphy-tools {
      justify-content: flex-start;
    }
  }
  @media (max-width: 620px) {
    .murphy-shell-header {
      padding: 16px 16px 14px;
      gap: 14px;
    }
    .murphy-brand {
      flex-direction: column;
      gap: 10px;
    }
    .murphy-signature {
      font-size: 28px;
    }
    .murphy-link {
      flex: 1 1 140px;
    }
    .murphy-tools {
      gap: 8px;
    }
  }


  :root {
    --bg: #000; --surface: #0a0a0a; --border: #222; --text: #d9f1ff;
    --text-dim: #7b8da6; --brand: #4dc3ff; --good: #4dffb4; --warn: #ffc04d; --bad: #ff5c5c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace; }

  .roadmap-vision {
    padding: 32px 24px 24px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .roadmap-vision h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--brand);
  }
  .roadmap-vision .vision-text {
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.5;
  }
  .roadmap-vision .updated {
    color: var(--text-dim);
    font-size: 12px;
    margin-top: 8px;
    opacity: 0.7;
  }

  .horizon-section {
    max-width: 1200px;
    margin: 0 auto;
    padding: 16px 24px;
  }
  .horizon-label {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .horizon-label.now { color: var(--brand); border-color: var(--brand); }
  .horizon-label.next { color: var(--warn); border-color: var(--warn); }
  .horizon-label.later { color: var(--text-dim); border-color: var(--border); }

  .theme-grid {
    display: grid;
    gap: 16px;
    grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    margin-bottom: 24px;
  }
  .theme-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px;
  }
  .theme-card:hover {
    border-color: #333;
  }
  .theme-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  .theme-desc {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 12px;
    line-height: 1.4;
  }

  .goal-item {
    padding: 10px 0;
    border-top: 1px solid var(--border);
  }
  .goal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .goal-name {
    font-size: 14px;
    color: var(--text);
    font-weight: 600;
  }
  .goal-status {
    font-size: 11px;
    padding: 2px 8px;
    border: 1px solid;
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .goal-status.done { color: var(--good); border-color: rgba(77,255,180,0.4); }
  .goal-status.in_progress { color: var(--brand); border-color: rgba(77,195,255,0.4); }
  .goal-status.planned { color: var(--text-dim); border-color: var(--border); }

  .goal-desc {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
    line-height: 1.4;
  }

  .milestone-list {
    margin-top: 8px;
    padding-left: 0;
    list-style: none;
  }
  .milestone-list li {
    font-size: 12px;
    color: var(--text-dim);
    padding: 3px 0;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .milestone-list li::before {
    content: '';
    display: inline-block;
    width: 8px;
    height: 8px;
    border: 1px solid var(--border);
    flex-shrink: 0;
    margin-top: 2px;
  }
  .milestone-list li.done::before {
    background: var(--good);
    border-color: var(--good);
  }
  .milestone-list li.in_progress::before {
    background: var(--brand);
    border-color: var(--brand);
  }
  .milestone-ids {
    font-size: 10px;
    color: var(--text-dim);
    opacity: 0.6;
  }

  @media (max-width: 600px) {
    .roadmap-vision { padding: 20px 16px 16px; }
    .roadmap-vision h1 { font-size: 22px; }
    .horizon-section { padding: 12px 16px; }
    .theme-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<header class="murphy-shell-header">
  <div class="murphy-brand">
    <a class="murphy-signature" href="../">Murphy</a>
    <div class="murphy-context">
      <div class="murphy-kicker">Agent Monitor public surfaces</div>
      <div class="murphy-title-row">
        <span class="murphy-surface">Roadmap</span>
        <span class="murphy-divider">/</span>
        <span class="murphy-note">strategic direction and milestones</span>
      </div>
    </div>
  </div>
  <nav class="murphy-nav" aria-label="Site routes">
    <a class="murphy-link" href="../" title="Live supervisor state">Monitor</a>
    <a class="murphy-link current" href="../roadmap/" aria-current="page" title="Strategic themes and milestones">Roadmap</a>
    <a class="murphy-link" href="../backlog/" title="Fixes, features, and completed work">Backlog</a>
    <a class="murphy-link" href="../showcase/" title="Browser tools and demos">Showcase</a>
    <a class="murphy-link" href="../tokenizers/" title="Tokenizer workbench">Tokenizers</a>
    <a class="murphy-link" href="../showcase/res-publica/" title="Architecture exhibit">Res Publica</a>
  </nav>
  <div class="murphy-tools"></div>
</header>
<main>
  <section class="roadmap-vision">
    <h1>Roadmap</h1>
    <p class="vision-text" id="vision-text"></p>
    <p class="updated" id="updated-text"></p>
  </section>
  <div id="roadmap-content"></div>
</main>
<script>
var ROADMAP = {"last_updated": "2026-03-23", "vision": "An autonomous research agent that independently conducts, writes up, and delivers high-quality research while maintaining its own infrastructure.", "themes": [{"id": "reliability", "name": "System Reliability", "description": "Make the supervisor, workers, and dispatch pipeline robust and self-healing", "goals": [{"name": "Stable parallel dispatch", "horizon": "now", "status": "in_progress", "description": "8 concurrent workers with clean worktree isolation, merge coordination, and crash recovery", "milestones": [{"name": "Per-task outcomes + streaming logs", "status": "done", "backlog_ids": ["AGENT-002", "AGENT-003"]}, {"name": "Worker worktree isolation", "status": "done", "backlog_ids": ["AGENT-029"]}, {"name": "Concurrent .agent/ write coordination", "status": "done", "backlog_ids": ["FIX-004"]}, {"name": "Worker hang detection", "status": "done", "backlog_ids": ["AGENT-028"]}, {"name": "Multi-worker project collaboration", "status": "planned", "backlog_ids": ["AGENT-020"]}]}, {"name": "Session persistence", "horizon": "now", "status": "done", "description": "Workers resume codex sessions across re-dispatches, preserving context and reducing cold-start overhead", "milestones": [{"name": "Session resume with prompt hashing", "status": "done", "backlog_ids": ["AGENT-025"]}, {"name": "Remove slot affinity", "status": "done", "backlog_ids": ["AGENT-046"]}]}, {"name": "Quality gate pipeline", "horizon": "now", "status": "in_progress", "description": "Multi-role review (Tribune + iterative-review) ensures code quality before merge", "milestones": [{"name": "Tribune role implementation", "status": "done", "backlog_ids": ["AGENT-033"]}, {"name": "Iterative review skill", "status": "done", "backlog_ids": ["AGENT-035"]}, {"name": "Tribune integration bug fixes", "status": "in_progress", "backlog_ids": ["FIX-010", "FIX-017"]}]}]}, {"id": "research", "name": "Research Workflow", "description": "End-to-end pipeline from task assignment to delivered research artifacts", "goals": [{"name": "Deep research capabilities", "horizon": "now", "status": "in_progress", "description": "Athena consultation, literature search, and structured research delivery", "milestones": [{"name": "Consult history persistence", "status": "done", "backlog_ids": ["AGENT-021"]}, {"name": "Visualization system", "status": "done", "backlog_ids": ["AGENT-017"]}, {"name": "Project sub-sessions", "status": "done", "backlog_ids": []}]}, {"name": "Thread management at scale", "horizon": "next", "status": "planned", "description": "Handle long-running tasks with thread continuation and structured context", "milestones": [{"name": "Thread length cap with continuation", "status": "planned", "backlog_ids": ["AGENT-010"]}, {"name": "Structured thread presentation contract", "status": "planned", "backlog_ids": ["AGENT-016"]}]}]}, {"id": "observability", "name": "Observability \u0026 Dashboard", "description": "Public monitoring, planning surface, and ecosystem awareness", "goals": [{"name": "Public dashboard", "horizon": "now", "status": "done", "description": "GitHub Pages static site with live supervisor state, backlog, and showcase", "milestones": [{"name": "Dashboard redesign", "status": "done", "backlog_ids": ["AGENT-026"]}, {"name": "Backlog page with dispatch", "status": "done", "backlog_ids": ["AGENT-043"]}, {"name": "Decouple publisher from supervisor", "status": "done", "backlog_ids": ["AGENT-044"]}]}, {"name": "Strategic roadmap visualization", "horizon": "now", "status": "in_progress", "description": "Visual roadmap showing themes, goals, and milestones alongside the tactical backlog", "milestones": [{"name": "Roadmap JSON + dashboard page", "status": "in_progress", "backlog_ids": []}, {"name": "Standalone HTML export", "status": "planned", "backlog_ids": []}]}, {"name": "Ecosystem awareness", "horizon": "now", "status": "done", "description": "Daily scouting of agent ecosystem developments to inform system evolution", "milestones": [{"name": "Ecosystem scouting procedure", "status": "done", "backlog_ids": ["AGENT-031"]}]}]}, {"id": "architecture", "name": "System Architecture", "description": "Clean abstractions, contract-driven behavior, and maintainable codebase", "goals": [{"name": "Multi-role behavioral contracts", "horizon": "next", "status": "planned", "description": "Coherent contract architecture across Worker, Developer, and Tribune roles", "milestones": [{"name": "Rethink contract structure", "status": "planned", "backlog_ids": ["AGENT-034"]}]}, {"name": "Credential and asset management", "horizon": "next", "status": "planned", "description": "Structured registry for user-scoped credentials and shared resources", "milestones": [{"name": "User-scoped credential registry", "status": "planned", "backlog_ids": ["AGENT-037"]}]}, {"name": "Skill library", "horizon": "now", "status": "done", "description": "Version-controlled Codex skills with auto-discovery and progressive disclosure", "milestones": [{"name": "Skills to .agent/skills/", "status": "done", "backlog_ids": ["AGENT-009"]}, {"name": "Skill learning workflow", "status": "done", "backlog_ids": ["AGENT-041"]}]}]}, {"id": "resilience", "name": "Data Resilience", "description": "Backup, recovery, and data integrity for runtime artifacts", "goals": [{"name": "Cloud backup", "horizon": "now", "status": "in_progress", "description": "Google Drive syncing for all runtime artifacts that git doesn't track", "milestones": [{"name": "Google Drive for Desktop setup", "status": "in_progress", "backlog_ids": ["AGENT-038"]}]}, {"name": "State validation", "horizon": "now", "status": "done", "description": "JSON integrity validation for all .agent/ data files", "milestones": [{"name": "validate_agent_state.py", "status": "done", "backlog_ids": ["AGENT-030"]}]}]}]};
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

(function() {
  document.getElementById('vision-text').textContent = ROADMAP.vision || '';
  var updated = ROADMAP.last_updated || '';
  if (updated) document.getElementById('updated-text').textContent = 'Last updated: ' + updated;

  var themes = ROADMAP.themes || [];
  var horizons = ['now', 'next', 'later'];
  var horizonLabels = {now: 'Now', next: 'Next', later: 'Later'};
  var content = document.getElementById('roadmap-content');
  var html = '';

  horizons.forEach(function(h) {
    // Collect goals for this horizon across all themes, grouped by theme
    var themeCards = [];
    themes.forEach(function(theme) {
      var goals = (theme.goals || []).filter(function(g) { return g.horizon === h; });
      if (goals.length === 0) return;
      var goalsHtml = goals.map(function(goal) {
        var milestones = (goal.milestones || []).map(function(m) {
          var ids = (m.backlog_ids || []).length > 0
            ? ' <span class="milestone-ids">' + m.backlog_ids.map(esc).join(', ') + '</span>'
            : '';
          return '<li class="' + esc(m.status) + '">' + esc(m.name) + ids + '</li>';
        }).join('');
        return '<div class="goal-item">' +
          '<div class="goal-header">' +
            '<span class="goal-name">' + esc(goal.name) + '</span>' +
            '<span class="goal-status ' + esc(goal.status) + '">' + esc(goal.status.replace(/_/g, ' ')) + '</span>' +
          '</div>' +
          '<div class="goal-desc">' + esc(goal.description || '') + '</div>' +
          (milestones ? '<ul class="milestone-list">' + milestones + '</ul>' : '') +
        '</div>';
      }).join('');
      themeCards.push(
        '<div class="theme-card">' +
          '<div class="theme-name">' + esc(theme.name) + '</div>' +
          '<div class="theme-desc">' + esc(theme.description || '') + '</div>' +
          goalsHtml +
        '</div>'
      );
    });
    if (themeCards.length === 0) return;
    html += '<section class="horizon-section">' +
      '<div class="horizon-label ' + h + '">' + horizonLabels[h] + '</div>' +
      '<div class="theme-grid">' + themeCards.join('') + '</div>' +
    '</section>';
  });

  content.innerHTML = html;
})();
</script>
</body>
</html>
