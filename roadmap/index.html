<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roadmap — Agent Monitor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  :root {
    --bg-base: #000; --bg-border: rgba(56,240,255,0.5); --bg-border-strong: rgba(56,240,255,0.8);
    --text-main: #eaffff; --text-muted: #99a6d8; --text-dim: #6d79ad;
    --brand: #38f0ff; --brand-alt: #ff2fb3;
    --good: #4dffb4; --warn: #ffe66a; --bad: #ff6689;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Rajdhani", "Avenir Next", "Segoe UI", sans-serif;
    background: #000; color: var(--text-main); font-size: 15px;
    min-height: 100vh; overflow-x: hidden;
  }

  header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 20px; background: #000;
    border-bottom: 3px solid #38f0ff;
    flex-wrap: wrap; position: sticky; top: 0; z-index: 2;
  }
  header h1 {
    font-family: "Orbitron", "Rajdhani", sans-serif;
    font-size: 18px; font-weight: 700; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--brand);
  }
  header a {
    color: var(--text-muted); text-decoration: none; font-size: 13px;
    border: 1px solid var(--text-dim); padding: 2px 10px;
  }
  header a:hover { color: var(--brand); border-color: var(--brand); }

  main { max-width: 960px; margin: 0 auto; padding: 20px; }

  /* Settings panel */
  .settings { margin-bottom: 20px; }
  .settings-toggle {
    background: none; border: 2px solid var(--text-dim); color: var(--text-muted);
    padding: 4px 12px; cursor: pointer; font-family: inherit; font-size: 12px;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .settings-toggle:hover { border-color: var(--brand); color: var(--brand); }
  .settings-body {
    display: none; margin-top: 10px; padding: 14px;
    border: 1px solid var(--bg-border); background: rgba(56,240,255,0.03);
  }
  .settings-body.open { display: block; }
  .settings-row { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
  .settings-row label { font-size: 12px; color: var(--text-muted); min-width: 100px; }
  .settings-row input {
    flex: 1; min-width: 200px; background: #0a0a1a; border: 1px solid var(--text-dim);
    color: var(--text-main); padding: 5px 8px; font-family: "JetBrains Mono", monospace;
    font-size: 12px;
  }
  .settings-row input:focus { outline: none; border-color: var(--brand); }
  .settings-btn {
    background: none; border: 2px solid var(--good); color: var(--good);
    padding: 4px 16px; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 600;
  }
  .settings-btn:hover { background: rgba(77,255,180,0.1); }
  .settings-status { font-size: 11px; margin-top: 6px; }
  .settings-status.ok { color: var(--good); }
  .settings-status.missing { color: var(--warn); }

  /* Tab bar */
  .tab-bar { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 2px solid var(--text-dim); }
  .tab-btn {
    background: none; border: none; border-bottom: 2px solid transparent;
    color: var(--text-muted); padding: 8px 16px; cursor: pointer;
    font-family: inherit; font-size: 14px; font-weight: 600;
    margin-bottom: -2px;
  }
  .tab-btn:hover { color: var(--text-main); }
  .tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

  /* Roadmap grid */
  .roadmap-grid { display: grid; gap: 10px; }
  .roadmap-item {
    border: 1px solid rgba(56,240,255,0.15); background: #000;
    padding: 12px 14px; display: grid; gap: 6px;
    transition: border-color 0.15s;
  }
  .roadmap-item:hover { border-color: rgba(56,240,255,0.4); }
  .roadmap-item[data-priority="Critical"] { border-left: 3px solid var(--bad); }
  .roadmap-item[data-priority="High"] { border-left: 3px solid var(--warn); }
  .roadmap-item[data-priority="Medium"] { border-left: 3px solid var(--brand); }
  .roadmap-item[data-priority="Low"] { border-left: 3px solid var(--text-dim); }

  .roadmap-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
  .roadmap-id {
    font-family: "JetBrains Mono", monospace; font-size: 12px;
    color: var(--brand); font-weight: 500;
  }
  .roadmap-task { font-size: 14px; color: #d9f1ff; line-height: 1.4; }
  .roadmap-meta {
    display: flex; gap: 10px; flex-wrap: wrap;
    font-size: 11px; color: var(--text-muted);
  }
  .roadmap-controls { display: flex; gap: 6px; align-items: center; }

  .pill {
    display: inline-block; padding: 1px 8px; font-size: 10px;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
    border: 1px solid; white-space: nowrap;
  }
  .pill-open { color: var(--brand); border-color: rgba(56,240,255,0.4); }
  .pill-deferred { color: var(--text-dim); border-color: rgba(109,121,173,0.4); }
  .pill-in_progress { color: var(--good); border-color: rgba(77,255,180,0.4); }
  .pill-priority-Critical { color: var(--bad); border-color: rgba(255,102,137,0.4); }
  .pill-priority-High { color: var(--warn); border-color: rgba(255,230,106,0.4); }

  .dispatch-btn {
    padding: 3px 10px; border: 2px solid rgba(56,240,255,0.4);
    background: #000; color: #d9f6ff; font-size: 11px;
    font-weight: 600; cursor: pointer; font-family: "Rajdhani", sans-serif;
    white-space: nowrap;
    box-shadow: 2px 2px 0 rgba(255,47,179,0.15);
    transition: all 0.1s;
  }
  .dispatch-btn:hover {
    border-color: rgba(56,240,255,0.8);
    box-shadow: 3px 3px 0 rgba(255,47,179,0.3);
  }
  .dispatch-btn:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }
  .dispatch-btn.success { border-color: var(--good); color: var(--good); }
  .dispatch-btn.error { border-color: var(--bad); color: var(--bad); }

  .empty { color: var(--text-dim); font-size: 13px; padding: 20px 0; text-align: center; }
</style>
</head>
<body>
<header>
  <h1>Roadmap</h1>
  <a href="../">← Dashboard</a>
</header>
<main>
  <div class="settings">
    <button class="settings-toggle" onclick="toggleSettings()">⚙ Dispatch Settings</button>
    <div class="settings-body" id="settings-body">
      <div class="settings-row">
        <label>Webhook URL</label>
        <input type="text" id="cfg-webhook" placeholder="https://hooks.slack.com/services/T.../B.../XXX" />
      </div>
      <div class="settings-row">
        <label>Agent User ID</label>
        <input type="text" id="cfg-userid" placeholder="Murphy's Slack user ID (U...)" />
      </div>
      <div class="settings-row">
        <button class="settings-btn" onclick="saveSettings()">Save</button>
      </div>
      <div class="settings-status" id="settings-status"></div>
    </div>
  </div>
  <div class="tab-bar" id="tab-bar"></div>
  <div id="roadmap-body"></div>
</main>
<script>
const ROADMAP_DATA = [{"id": "FIX-002", "queue": "fix", "created": "2026-03-20", "priority": "High", "status": "open", "task": "Extend pre-commit hook to block protected paths on all branches", "context": "Hook only checks protected paths when `current_branch == \"main\"`. Workers can commit `src/` on `worker-N` branch, which then gets merged into main by supervisor fallback.", "done_when": "Protected-path check fires for all branches when `AGENT_WORKER=1`, not just main.", "has_plan": false, "has_issue": false}, {"id": "FIX-003", "queue": "fix", "created": "2026-03-20", "priority": "Medium", "status": "open", "task": "Reset worktree before fallback merge dispatch", "context": "`_fallback_merge_dispatch()` runs a merge worker in the slot's existing worktree without calling `setup_worktree()` first. Worktree may be in a stale state.", "done_when": "Fallback merge worker starts in a clean worktree state.", "has_plan": false, "has_issue": false}, {"id": "FIX-004", "queue": "fix", "created": "2026-03-20", "priority": "Medium", "status": "open", "task": "Concurrent `.agent/` write coordination", "context": "Multiple workers write to `.agent/memory/memory.md` etc. through symlinks concurrently. Last-write-wins, no locking.", "done_when": "Advisory locking or supervisor-mediated updates for shared `.agent/` state files.", "has_plan": false, "has_issue": false}, {"id": "FIX-007", "queue": "fix", "created": "2026-03-21", "priority": "Medium", "status": "open", "task": "Iterative-review secret scanning should cover full file contents", "context": "Current secret scanning only checks the diff. Reviewers have full file-read access, so secrets in unchanged hunks of reviewed files are still exposed.", "done_when": "Scan full contents of all files in review scope (not just diff hunks) before each round.", "has_plan": false, "has_issue": false}, {"id": "FIX-008", "queue": "fix", "created": "2026-03-21", "priority": "Critical", "status": "open", "task": "Done marker regression: task completion invisible to humans", "context": "AGENT-022 removed `_notify_task_done` (redundant notification). Side effect: no visible \"task done\" marker in Slack thread — humans can't tell when tasks close. Issue, earlier report", "done_when": "Task completion posts a visible signal in the Slack thread (restored marker or equivalent).", "has_plan": false, "has_issue": true}, {"id": "FIX-009", "queue": "fix", "created": "2026-03-21", "priority": "High", "status": "open", "task": "Tribune Slack token exposure in config/docs", "context": "Gemini-side Slack MCP config and Tribune design docs contain literal Slack token values instead of env var indirection. Risk of leak into logs/context/history. Issue", "done_when": "All Slack tokens use env var indirection; literal values scrubbed from config, docs, and git history.", "has_plan": false, "has_issue": true}, {"id": "FIX-010", "queue": "fix", "created": "2026-03-21", "priority": "High", "status": "open", "task": "Tribune review handoff integration gaps (4 bugs)", "context": "AGENT-033 shipped the Tribune role but left 4 integration bugs: (1) worker prompt doesn't override `waiting_human` for draft-requiring tasks, (2) Slack post failure after approval doesn't requeue, (3)", "done_when": "All 4 handoff gaps resolved; Tribune review → Slack delivery path reliable end-to-end.", "has_plan": false, "has_issue": true}, {"id": "FIX-011", "queue": "fix", "created": "2026-03-21", "priority": "Medium", "status": "open", "task": "Slack `conversations_add_message` returns phantom `ts`", "context": "Returned `ts` can't be retrieved as a real thread root via `conversations.replies`. Affects maintenance task lifecycle (first post establishes `thread_ts`). Issue", "done_when": "Maintenance thread creation uses a Slack API method that returns a retrievable `ts`, or validates the returned `ts` before relying on it.", "has_plan": false, "has_issue": true}, {"id": "FIX-012", "queue": "fix", "created": "2026-03-21", "priority": "Low", "status": "open", "task": "`_swap_model_in_cmd` doesn't handle `--model` long form", "context": "Helper only recognizes `-m`, not `--model` or `--model=...`. If `TRIBUNE_CMD` uses long form, fallback inserts a duplicate flag. Found during FIX-006 iterative review (M-3-1).", "done_when": "`_swap_model_in_cmd` and `_extract_model` handle `-m`, `--model`, and `--model=` forms.", "has_plan": false, "has_issue": false}, {"id": "FIX-013", "queue": "fix", "created": "2026-03-21", "priority": "Medium", "status": "open", "task": "Worker worktree shared symlinks break normal git flow", "context": "Symlinked `.agent/` and `projects/` in worktrees break `git status`, `git add`, and submodule commands. Workers need index-level workarounds. Failure modes 1-2 fixed; remaining friction documented. Is", "done_when": "Workers can use standard git commands on shared paths without index-level workarounds, or the workaround is fully automated.", "has_plan": false, "has_issue": true}, {"id": "AGENT-010", "queue": "feature", "created": "2026-02-27", "priority": "Medium", "status": "open", "task": "Thread length cap: finish current thread and start a new one when thread exceeds ~50 messages", "context": "Long-running tasks accumulate large threads that degrade Slack UX and balloon prompt context.", "done_when": "When thread message count exceeds threshold (configurable, default ~50), worker finishes current thread with a link-forward message and initiates a new thread; task JSON tracks multiple `thread_ts` en", "has_plan": false, "has_issue": false}, {"id": "AGENT-016", "queue": "feature", "created": "2026-02-27", "priority": "Medium", "status": "open", "task": "Define supervisor→worker thread presentation contract", "context": "Supervisor passes raw `mention_text` and thread snapshots to the worker with no formal schema for how thread context is structured. Worker-facing rules about message format (removed from AGENTS.md as ", "done_when": "Supervisor renders thread context into a documented, versioned schema; worker contract references the schema; edge cases (attachments, reactions, edits) are handled explicitly.", "has_plan": false, "has_issue": false}, {"id": "AGENT-020", "queue": "feature", "created": "2026-03-12", "priority": "Medium", "status": "open", "task": "Multi-worker project collaboration: coordination when multiple workers touch the same project", "context": "With 8 concurrent workers, multiple may be dispatched to tasks in the same project submodule. Currently no coordination — workers would clobber each other's changes in the shared symlinked project dir", "done_when": "Workers dispatched to the same project coordinate via a locking/queuing mechanism; concurrent same-project work either serializes or partitions cleanly; merge conflicts from parallel project edits are", "has_plan": false, "has_issue": false}, {"id": "AGENT-025", "queue": "feature", "created": "2026-03-13", "priority": "High", "status": "open", "task": "Persistent thread sessions: session resume + mid-execution thread awareness. Plan", "context": "Phase 0 spike completed (2026-03-21): `codex exec resume \u003cSESSION_ID\u003e -` works in piped subprocess mode, session IDs parseable from startup header, full context retention confirmed. Next: Phase 1 impl", "done_when": "Phase 1: drop `--ephemeral`, capture session IDs, re-dispatch via `codex exec resume \u003cID\u003e` with slot affinity. Phase 2: workers check `conversations_replies` at phase boundaries (behavioral contract).", "has_plan": false, "has_issue": false}, {"id": "AGENT-038", "queue": "feature", "created": "2026-03-20", "priority": "Medium", "status": "open", "task": "Google Drive backup for agent system via Google Drive for Desktop", "context": "No cloud backup for runtime artifacts (~2.2GB). Machine loss = total state loss. Git now tracks codebase only; `.gitignore` cleaned to remove artifact paths.", "done_when": "Google Drive for Desktop installed, `~/Research/`, `~/.claude/`, and `~/.codex/` syncing to Murphy's Google Drive; verified on drive.google.com.", "has_plan": false, "has_issue": false}, {"id": "AGENT-034", "queue": "feature", "created": "2026-03-20", "priority": "Medium", "status": "open", "task": "Rethink behavioral contract structure across three roles", "context": "Currently: `AGENTS.md` for Worker (Codex), `CLAUDE.md` for Developer (Claude), `GEMINI.md` for Tribune (Gemini). Each CLI auto-loads its own doc, but the separation needs design review — shared vs. ro", "done_when": "Coherent multi-role contract architecture; clear boundaries between shared system docs and role-specific behavioral contracts; no duplication of rules across docs.", "has_plan": false, "has_issue": false}, {"id": "AGENT-037", "queue": "feature", "created": "2026-03-21", "priority": "Medium", "status": "open", "task": "User-scoped credential/asset registry", "context": "No durable index for user-scoped credentials and shared assets (accounts, API keys location, shared resources). Workers repeatedly search for the same info. Issue", "done_when": "Structured per-user or system-wide registry of credential locations and external assets; workers can look up \"where is X?\" without re-discovery.", "has_plan": false, "has_issue": true}, {"id": "AGENT-036", "queue": "feature", "created": "2026-03-21", "priority": "Low", "status": "deferred", "task": "Multi-role round-table discussion skill", "context": "Generalization of AGENT-035 iterative review to collaborative deliberation. Deferred: speculative, depends on AGENT-035 maturity in production. Existing loop mode covers deliberation use cases. Revisi", "done_when": "A Claude Code slash command for multi-perspective design discussions.", "has_plan": false, "has_issue": false}, {"id": "AGENT-039", "queue": "feature", "created": "2026-03-21", "priority": "Medium", "status": "open", "task": "Clean up dispatch prompt: remove unnecessary metadata from thread context", "context": "`_task_json_to_text()` formats each message as `[2026-03-21 07:01 UTC (1774076482.886199)", "done_when": "user: U08HX3SH33R", "has_plan": false, "has_issue": false}, {"id": "AGENT-040", "queue": "feature", "created": "2026-03-21", "priority": "Medium", "status": "open", "task": "Tool-aware worker idle watchdog", "context": "AGENT-028's session-log staleness watchdog can false-kill workers during legitimate long tool calls (e.g., 30-60 min Athena consults). Plan", "done_when": "Watchdog distinguishes idle workers from workers blocked on long tool calls; no false kills during legitimate Athena/GPU operations.", "has_plan": true, "has_issue": false}, {"id": "AGENT-041", "queue": "feature", "created": "2026-03-21", "priority": "Medium", "status": "open", "task": "Overleaf git sync skill", "context": "Steady-state workflow for syncing Overleaf projects via local git clone. Plan, bootstrap plan", "done_when": "Codex skill automates Overleaf pull/push/conflict resolution, including initial project bootstrap.", "has_plan": true, "has_issue": false}, {"id": "AGENT-042", "queue": "feature", "created": "2026-03-21", "priority": "Low", "status": "open", "task": "Tribune default model: switch to `gemini-3.1-pro`", "context": "`TRIBUNE_CMD` defaults to `gemini-2.5-pro`. User requested switching to `gemini-3.1-pro`. Plan", "done_when": "`TRIBUNE_CMD` defaults to `gemini-3.1-pro`; fallback chain updated accordingly.", "has_plan": true, "has_issue": false}];

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function toggleSettings() {
  document.getElementById('settings-body').classList.toggle('open');
}

function loadSettings() {
  var wh = localStorage.getItem('dispatch_webhook') || '';
  var uid = localStorage.getItem('dispatch_userid') || '';
  document.getElementById('cfg-webhook').value = wh;
  document.getElementById('cfg-userid').value = uid;
  updateSettingsStatus();
}

function saveSettings() {
  var wh = document.getElementById('cfg-webhook').value.trim();
  var uid = document.getElementById('cfg-userid').value.trim();
  localStorage.setItem('dispatch_webhook', wh);
  localStorage.setItem('dispatch_userid', uid);
  updateSettingsStatus();
}

function updateSettingsStatus() {
  var el = document.getElementById('settings-status');
  var wh = localStorage.getItem('dispatch_webhook') || '';
  var uid = localStorage.getItem('dispatch_userid') || '';
  if (wh && uid) {
    el.textContent = '✓ Dispatch configured';
    el.className = 'settings-status ok';
  } else {
    el.textContent = 'Configure webhook URL and user ID to enable dispatch';
    el.className = 'settings-status missing';
  }
}

function canDispatch() {
  return !!(localStorage.getItem('dispatch_webhook') && localStorage.getItem('dispatch_userid'));
}

function dispatchItem(itemId) {
  if (!canDispatch()) { alert('Configure dispatch settings first.'); return; }
  if (!confirm('Dispatch development task for ' + itemId + '?')) return;
  var btn = document.querySelector('[data-dispatch="' + itemId + '"]');
  if (btn) { btn.textContent = '...'; btn.disabled = true; }
  var webhook = localStorage.getItem('dispatch_webhook');
  var userId = localStorage.getItem('dispatch_userid');
  var text = '<@' + userId + '> !developer ' + itemId;
  fetch(webhook, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text: text }),
  })
  .then(function() {
    if (btn) { btn.textContent = '✓ Sent'; btn.className = 'dispatch-btn success'; }
    setTimeout(function() {
      if (btn) { btn.textContent = '▶ Dispatch'; btn.className = 'dispatch-btn'; btn.disabled = false; }
    }, 3000);
  })
  .catch(function(err) {
    if (btn) { btn.textContent = '✗ Error'; btn.className = 'dispatch-btn error'; }
    setTimeout(function() {
      if (btn) { btn.textContent = '▶ Dispatch'; btn.className = 'dispatch-btn'; btn.disabled = false; }
    }, 3000);
  });
}

function renderRoadmap() {
  var items = ROADMAP_DATA || [];
  var fixes = items.filter(function(i) { return i.queue === 'fix'; });
  var features = items.filter(function(i) { return i.queue === 'feature'; });
  var groups = [['Fixes (' + fixes.length + ')', fixes], ['Features (' + features.length + ')', features]];

  var tabs = document.getElementById('tab-bar');
  tabs.innerHTML = groups.map(function(g, i) {
    return '<button class="tab-btn' + (i === 0 ? ' active' : '') + '" data-tab="' + i + '">' + g[0] + '</button>';
  }).join('');

  function renderGroup(arr) {
    if (!arr.length) return '<div class="empty">No items</div>';
    return '<div class="roadmap-grid">' + arr.map(function(item) {
      var statusClass = 'pill-' + item.status.replace(/ /g, '_');
      var isDeferred = item.status === 'deferred';
      var priClass = (item.priority === 'Critical' || item.priority === 'High') ? ' pill-priority-' + item.priority : '';
      var badges = '';
      if (item.has_plan) badges += '<span style="color:var(--good)">Plan</span>';
      if (item.has_issue) badges += '<span style="color:var(--warn)">Issue</span>';

      return '<div class="roadmap-item" data-priority="' + esc(item.priority) + '">' +
        '<div class="roadmap-top">' +
          '<span class="roadmap-id">' + esc(item.id) + '</span>' +
          '<div class="roadmap-controls">' +
            '<span class="pill ' + statusClass + '">' + esc(item.status) + '</span>' +
            '<button class="dispatch-btn" data-dispatch="' + esc(item.id) + '" ' +
              (isDeferred ? 'disabled title="Deferred"' : '') +
              '>▶ Dispatch</button>' +
          '</div>' +
        '</div>' +
        '<div class="roadmap-task">' + esc(item.task) + '</div>' +
        '<div class="roadmap-meta">' +
          '<span' + priClass + '>' + esc(item.priority) + '</span>' +
          '<span>' + esc(item.created) + '</span>' +
          badges +
        '</div>' +
      '</div>';
    }).join('') + '</div>';
  }

  var body = document.getElementById('roadmap-body');
  body.innerHTML = renderGroup(fixes);

  tabs.onclick = function(e) {
    var btn = e.target.closest('[data-tab]');
    if (!btn) return;
    var idx = parseInt(btn.dataset.tab);
    tabs.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    body.innerHTML = renderGroup(groups[idx][1]);
  };

  document.querySelector('main').addEventListener('click', function(e) {
    var btn = e.target.closest('.dispatch-btn');
    if (btn && !btn.disabled) dispatchItem(btn.dataset.dispatch);
  });
}

loadSettings();
renderRoadmap();
</script>
</body>
</html>
