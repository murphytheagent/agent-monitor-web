<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roadmap — Agent Monitor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  :root {
    --bg-base: #000; --bg-border: rgba(56,240,255,0.5); --bg-border-strong: rgba(56,240,255,0.8);
    --text-main: #eaffff; --text-muted: #99a6d8; --text-dim: #6d79ad;
    --brand: #38f0ff; --brand-alt: #ff2fb3;
    --good: #4dffb4; --warn: #ffe66a; --bad: #ff6689;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Rajdhani", "Avenir Next", "Segoe UI", sans-serif;
    background: #000; color: var(--text-main); font-size: 15px;
    min-height: 100vh; overflow-x: hidden;
  }

  header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 20px; background: #000;
    border-bottom: 3px solid #38f0ff;
    flex-wrap: wrap; position: sticky; top: 0; z-index: 2;
  }
  header h1 {
    font-family: "Orbitron", "Rajdhani", sans-serif;
    font-size: 18px; font-weight: 700; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--brand);
  }
  header a {
    color: var(--text-muted); text-decoration: none; font-size: 13px;
    border: 1px solid var(--text-dim); padding: 2px 10px;
  }
  header a:hover { color: var(--brand); border-color: var(--brand); }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .status-dot.ok { background: var(--good); }
  .status-dot.missing { background: var(--warn); }

  main { max-width: 960px; margin: 0 auto; padding: 20px; }

  /* Settings panel */
  .settings { margin-bottom: 20px; }
  .settings-toggle {
    background: none; border: 2px solid var(--text-dim); color: var(--text-muted);
    padding: 4px 12px; cursor: pointer; font-family: inherit; font-size: 12px;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .settings-toggle:hover { border-color: var(--brand); color: var(--brand); }
  .settings-body {
    display: none; margin-top: 10px; padding: 14px;
    border: 1px solid var(--bg-border); background: rgba(56,240,255,0.03);
  }
  .settings-body.open { display: block; }
  .settings-row { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
  .settings-row label { font-size: 12px; color: var(--text-muted); min-width: 100px; }
  .settings-row input {
    flex: 1; min-width: 200px; background: #0a0a1a; border: 1px solid var(--text-dim);
    color: var(--text-main); padding: 5px 8px; font-family: "JetBrains Mono", monospace;
    font-size: 12px;
  }
  .settings-row input:focus { outline: none; border-color: var(--brand); }
  .settings-btn {
    background: none; border: 2px solid var(--good); color: var(--good);
    padding: 4px 16px; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 600;
  }
  .settings-btn:hover { background: rgba(77,255,180,0.1); }
  .settings-status { font-size: 11px; margin-top: 6px; }
  .settings-status.ok { color: var(--good); }
  .settings-status.missing { color: var(--warn); }

  /* Tab bar */
  .tab-bar { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 2px solid var(--text-dim); }
  .tab-btn {
    background: none; border: none; border-bottom: 2px solid transparent;
    color: var(--text-muted); padding: 8px 16px; cursor: pointer;
    font-family: inherit; font-size: 14px; font-weight: 600;
    margin-bottom: -2px;
  }
  .tab-btn:hover { color: var(--text-main); }
  .tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

  /* Roadmap grid */
  .roadmap-grid { display: grid; gap: 10px; }
  .roadmap-item {
    border: 1px solid rgba(56,240,255,0.15); background: #000;
    padding: 12px 14px; display: grid; gap: 6px;
    transition: border-color 0.15s;
  }
  .roadmap-item:hover { border-color: rgba(56,240,255,0.4); }
  .roadmap-item[data-priority="Critical"] { border-left: 3px solid var(--bad); }
  .roadmap-item[data-priority="High"] { border-left: 3px solid var(--warn); }
  .roadmap-item[data-priority="Medium"] { border-left: 3px solid var(--brand); }
  .roadmap-item[data-priority="Low"] { border-left: 3px solid var(--text-dim); }

  .roadmap-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
  .roadmap-id {
    font-family: "JetBrains Mono", monospace; font-size: 12px;
    color: var(--brand); font-weight: 500;
  }
  .roadmap-task { font-size: 14px; color: #d9f1ff; line-height: 1.4; }
  .roadmap-meta {
    display: flex; gap: 10px; flex-wrap: wrap;
    font-size: 11px; color: var(--text-muted);
  }
  .roadmap-controls { display: flex; gap: 6px; align-items: center; }

  .pill {
    display: inline-block; padding: 1px 8px; font-size: 10px;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
    border: 1px solid; white-space: nowrap;
  }
  .pill-open { color: var(--brand); border-color: rgba(56,240,255,0.4); }
  .pill-deferred { color: var(--text-dim); border-color: rgba(109,121,173,0.4); }
  .pill-in_progress { color: var(--good); border-color: rgba(77,255,180,0.4); }
  .pill-priority-Critical { color: var(--bad); border-color: rgba(255,102,137,0.4); }
  .pill-priority-High { color: var(--warn); border-color: rgba(255,230,106,0.4); }

  .dispatch-btn {
    padding: 3px 10px; border: 2px solid rgba(56,240,255,0.4);
    background: #000; color: #d9f6ff; font-size: 11px;
    font-weight: 600; cursor: pointer; font-family: "Rajdhani", sans-serif;
    white-space: nowrap;
    box-shadow: 2px 2px 0 rgba(255,47,179,0.15);
    transition: all 0.1s;
  }
  .dispatch-btn:hover {
    border-color: rgba(56,240,255,0.8);
    box-shadow: 3px 3px 0 rgba(255,47,179,0.3);
  }
  .dispatch-btn:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }
  .dispatch-btn.success { border-color: var(--good); color: var(--good); }
  .dispatch-btn.error { border-color: var(--bad); color: var(--bad); }

  .empty { color: var(--text-dim); font-size: 13px; padding: 20px 0; text-align: center; }

  /* Session log viewer */
  .session-panel {
    display: none; margin-top: 8px; border: 1px solid rgba(56,240,255,0.2);
    max-height: 600px; overflow-y: auto; background: #050510;
  }
  .session-panel.open { display: block; }
  .session-entry { padding: 8px 12px; border-bottom: 1px solid rgba(56,240,255,0.05); }
  .session-entry.role-assistant { border-left: 2px solid var(--brand); }
  .session-entry.role-user { border-left: 2px solid var(--text-dim); opacity: 0.7; }
  .session-ts { font-size: 10px; color: var(--text-dim); font-family: "JetBrains Mono", monospace; }
  .session-block { margin: 4px 0; }
  .session-text { font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  .session-tool { font-size: 12px; }
  .session-tool-name { color: var(--brand); font-weight: 600; font-family: "JetBrains Mono", monospace; }
  .session-tool-input { color: var(--text-muted); font-size: 11px; white-space: pre-wrap; word-break: break-word;
    max-height: 150px; overflow-y: auto; margin-top: 2px; }
  .session-result { font-size: 11px; color: var(--text-muted); white-space: pre-wrap; word-break: break-word;
    max-height: 200px; overflow-y: auto; border-left: 2px solid var(--text-dim); padding-left: 8px; margin: 4px 0; }
  .session-thinking { cursor: pointer; }
  .session-thinking-label { font-size: 11px; color: var(--brand-alt); font-style: italic; }
  .session-thinking-body { display: none; font-size: 11px; color: var(--text-dim); white-space: pre-wrap;
    word-break: break-word; max-height: 300px; overflow-y: auto; margin-top: 2px; }
  .session-thinking.open .session-thinking-body { display: block; }
  .session-toolbar { display: flex; gap: 6px; padding: 6px 12px; border-bottom: 1px solid rgba(56,240,255,0.1);
    background: #0a0a1a; position: sticky; top: 0; z-index: 1; }
  .view-session-btn {
    padding: 2px 8px; border: 1px solid rgba(255,47,179,0.4); background: none;
    color: var(--brand-alt); font-size: 10px; font-weight: 600; cursor: pointer;
    font-family: "Rajdhani", sans-serif;
  }
  .view-session-btn:hover { border-color: var(--brand-alt); }
</style>
</head>

  <h1>Roadmap</h1>
  <a href="../">← Dashboard</a>
  <div class="header-right">
    <span class="status-dot missing" id="header-dot"></span>

  </div>
</header>
<main>

  <div id="roadmap-body"></div>
</main>

tions rewritten. 2 new tests, 335 pass."}, {"id": "AGENT-028", "created": "2026-03-19", "completed": "2026-03-19", "summary": "Worker hang detection: session log staleness watchdog (`WORKER_IDLE_TIMEOUT_SEC=900`), reduced `COLLECT_JOIN_TIMEOUT` from 2h to 10min. 4 new tests, 333 pass."}, {"id": "AGENT-018", "created": "2026-03-12", "completed": "2026-03-19", "summary": "Shell-job MVP: async job execution with durable records, CAS acknowledgements, ShellAdapter integration, startup recovery. All 4 phases complete."}, {"id": "AGENT-026", "created": "2026-03-17", "completed": "2026-03-20", "summary": "Dashboard brutalist cyberpunk redesign: pure black, zero radius, thick borders, offset shadows, chromatic aberration title. Showcase link as animated pill (holographic shimmer border, glitch jitter, r"}, {"id": "AGENT-021", "created": "2026-03-12", "completed": "2026-03-19", "summary": "Persist consult (Athena) conversation history: three-layer persistence (global archive `.agent/consult_history/{task_id}.jsonl`, per-project aggregate `.agent/projects/{slug}.consult.jsonl`, behaviora"}, {"id": "AGENT-027", "created": "2026-03-19", "completed": "2026-03-19", "summary": "Fix consult MCP ChatGPT UI selector migration: `main article` → `SEL_ASSISTANT_MSG`, updated completion buttons, diagnostic logging in response detector, developer review validation step with `check_s"}, {"id": "AGENT-017", "created": "2026-03-12", "completed": "2026-03-13", "summary": "Visualization system: `visualization-task` skill packaged with Mermaid-first workflow, provider routing, QA checklist, and delivery protocol. External MCP providers deferred."}, {"id": "AGENT-009", "created": "2026-02-27", "completed": "2026-03-13", "summary": "Move 13 Codex skills to `.agent/skills/` with per-skill symlinks; version-controlled, Codex discovery via symlinks. Consult/GPU skill packages deferred — workflow docs cover them."}, {"id": "AGENT-015", "created": "2026-02-27", "completed": "2026-03-13", "summary": "Pin `agent-monitor-web` submodule at checkpoints; set `ignore = all` in `.gitmodules` to hide continuous publisher drift."}, {"id": "AGENT-014", "created": "2026-02-27", "completed": "2026-03-13", "summary": "Remove legacy `first_task_objective_candidate()` and `mention_text_override` path — all tasks use structured JSON since AGENT-008."}, {"id": "AGENT-022", "created": "2026-03-13", "completed": "2026-03-13", "summary": "Remove redundant supervisor done notification (`_notify_task_done`). Delivery guard unchanged — sound and aligned with prompt language."}, {"id": "AGENT-007", "created": "2026-02-27", "completed": "2026-03-12", "summary": "Reduce no-op state rewrites: skip `save_state()` in `ensure_state_schema`, `prune_finished_tasks`, `prune_stale_waiting_human_tasks` when unchanged."}, {"id": "AGENT-012", "created": "2026-02-27", "completed": "2026-03-12", "summary": "(Absorbed into AGENT-007) Optimize `ensure_state_schema()` to skip rewrite when state is already current."}, {"id": "AGENT-013", "created": "2026-02-27", "completed": "2026-03-12", "summary": "Consolidate `_ts_sort_key()` and `ts_to_int()` into single canonical utility."}, {"id": "AGENT-006", "created": "2026-02-27", "completed": "2026-03-12", "summary": "Make Python runtime explicit: `from __future__ import annotations` in all modules, auto-detect python3.11 in launch script."}, {"id": "AGENT-001", "created": "2026-02-27", "completed": "2026-03-07", "summary": "Enforce completion-gate semantics (`high/moderate/low`) with explicit downgrade reasons."}, {"id": "AGENT-002", "created": "2026-02-27", "completed": "2026-02-27", "summary": "Per-task outcomes at `.agent/outcomes/\u003cmention_ts\u003e.json` (absorbed into multi-agent dispatch)."}, {"id": "AGENT-003", "created": "2026-02-27", "completed": "2026-02-27", "summary": "Stream worker logs to file (absorbed into multi-agent dispatch)."}, {"id": "AGENT-004", "created": "2026-02-27", "completed": "2026-02-28", "summary": "Fast polling: `POLL_INTERVAL=5` for ~5s mention detection."}, {"id": "AGENT-005", "created": "2026-02-24", "completed": "2026-02-24", "summary": "Remove legacy text snapshot; structured JSON approach is sole path."}, {"id": "AGENT-008", "created": "2026-02-23", "completed": "2026-02-23", "summary": "Migrate `.agent/tasks/` from Markdown to per-task JSON with thread history."}, {"id": "AGENT-011", "created": "2026-02-27", "completed": "2026-02-27", "summary": "Atomic select+claim under single lock (absorbed into multi-agent dispatch)."}];
const ACTIVE_DEV_ITEMS = ["FIX-008"];

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function toggleSettings() {
  document.getElementById('settings-body').classList.toggle('open');
}

var AGENT_USER_ID = 'U0AFZHQMAHX';

function loadSettings() {
  var wh = localStorage.getItem('dispatch_webhook') || '';
  document.getElementById('cfg-webhook').value = wh;
  updateSettingsStatus();
}

function saveSettings() {
  var wh = document.getElementById('cfg-webhook').value.trim();
  localStorage.setItem('dispatch_webhook', wh);
  updateSettingsStatus();
}

function updateSettingsStatus() {
  var el = document.getElementById('settings-status');
  var dot = document.getElementById('header-dot');
  var wh = localStorage.getItem('dispatch_webhook') || '';
  if (wh) {
    el.textContent = '✓ Dispatch configured';
    el.className = 'settings-status ok';
    dot.className = 'status-dot ok';
  } else {
    el.textContent = 'Configure webhook URL to enable dispatch';
    el.className = 'settings-status missing';
    dot.className = 'status-dot missing';
  }
}

function canDispatch() {
  return !!localStorage.getItem('dispatch_webhook');
}

function dispatchItem(itemId) {
  if (!canDispatch()) { alert('Configure dispatch settings first.'); return; }
  if (!confirm('Dispatch development task for ' + itemId + '?')) return;
  var btn = document.querySelector('[data-dispatch="' + itemId + '"]');
  if (btn) { btn.textContent = '...'; btn.disabled = true; }
  var webhook = localStorage.getItem('dispatch_webhook');
  var text = '<@' + AGENT_USER_ID + '> !developer ' + itemId;
  fetch(webhook, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text: text }),
  })
  .then(function() {
    if (btn) { btn.textContent = '✓ Sent'; btn.className = 'dispatch-btn success'; }
    setTimeout(function() {
      if (btn) { btn.textContent = '▶ Dispatch'; btn.className = 'dispatch-btn'; btn.disabled = false; }
    }, 3000);
  })
  .catch(function(err) {
    if (btn) { btn.textContent = '✗ Error'; btn.className = 'dispatch-btn error'; }
    setTimeout(function() {
      if (btn) { btn.textContent = '▶ Dispatch'; btn.className = 'dispatch-btn'; btn.disabled = false; }
    }, 3000);
  });
}

function renderRoadmap() {
  var items = ROADMAP_DATA || [];
  var completed = COMPLETED_DATA || [];
  var fixes = items.filter(function(i) { return i.queue === 'fix'; });
  var features = items.filter(function(i) { return i.queue === 'feature'; });
  var groups = [
    ['Fixes (' + fixes.length + ')', fixes, 'active'],
    ['Features (' + features.length + ')', features, 'active'],
    ['Completed (' + completed.length + ')', completed, 'completed'],
  ];

  var tabs = document.getElementById('tab-bar');
  tabs.innerHTML = groups.map(function(g, i) {
    return '<button class="tab-btn' + (i === 0 ? ' active' : '') + '" data-tab="' + i + '">' + g[0] + '</button>';
  }).join('');

  function renderGroup(arr) {
    if (!arr.length) return '<div class="empty">No items</div>';
    return '<div class="roadmap-grid">' + arr.map(function(item) {
      var isActive = ACTIVE_DEV_ITEMS.indexOf(item.id) >= 0;
      var statusClass = isActive ? 'pill-in_progress' : 'pill-' + item.status.replace(/ /g, '_');
      var statusText = isActive ? 'in progress' : item.status;
      var isDeferred = item.status === 'deferred';
      var priClass = (item.priority === 'Critical' || item.priority === 'High') ? ' pill-priority-' + item.priority : '';
      var badges = '';
      if (item.has_plan) badges += '<span style="color:var(--good)">Plan</span>';
      if (item.has_issue) badges += '<span style="color:var(--warn)">Issue</span>';

      return '<div class="roadmap-item" data-priority="' + esc(item.priority) + '">' +
        '<div class="roadmap-top">' +
          '<span class="roadmap-id">' + esc(item.id) + '</span>' +
          '<div class="roadmap-controls">' +
            '<span class="pill ' + statusClass + '">' + esc(statusText) + '</span>' +
            '<button class="dispatch-btn" data-dispatch="' + esc(item.id) + '" ' +
              (isDeferred || isActive ? 'disabled title="' + (isActive ? 'In progress' : 'Deferred') + '"' : '') +
              '>' + (isActive ? '⟳ Running' : '▶ Dispatch') + '</button>' +
          '</div>' +
        '</div>' +
        '<div class="roadmap-task">' + esc(item.task) + '</div>' +
        '<div class="roadmap-meta">' +
          '<span' + priClass + '>' + esc(item.priority) + '</span>' +
          '<span>' + esc(item.created) + '</span>' +
          badges +
          (isActive ? '<button class="view-session-btn" data-session="' + esc(item.id) + '">View Session</button>' : '') +
        '</div>' +
        (isActive ? '<div class="session-panel" id="session-' + esc(item.id) + '"></div>' : '') +
      '</div>';
    }).join('') + '</div>';
  }

  function renderCompleted(arr) {
    if (!arr.length) return '<div class="empty">No completed items</div>';
    return '<div class="roadmap-grid">' + arr.map(function(item) {
      return '<div class="roadmap-item" style="border-left:3px solid var(--good);opacity:0.75">' +
        '<div class="roadmap-top">' +
          '<span class="roadmap-id">' + esc(item.id) + '</span>' +
          '<span class="pill pill-open" style="color:var(--good);border-color:rgba(77,255,180,0.4)">done</span>' +
        '</div>' +
        '<div class="roadmap-task">' + esc(item.summary) + '</div>' +
        '<div class="roadmap-meta">' +
          '<span>Created: ' + esc(item.created) + '</span>' +
          '<span>Completed: ' + esc(item.completed) + '</span>' +
        '</div>' +
      '</div>';
    }).join('') + '</div>';
  }

  var body = document.getElementById('roadmap-body');
  body.innerHTML = renderGroup(fixes);

  tabs.onclick = function(e) {
    var btn = e.target.closest('[data-tab]');
    if (!btn) return;
    var idx = parseInt(btn.dataset.tab);
    tabs.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    var group = groups[idx];
    body.innerHTML = group[2] === 'completed' ? renderCompleted(group[1]) : renderGroup(group[1]);
  };

  document.querySelector('main').addEventListener('click', function(e) {
    var btn = e.target.closest('.dispatch-btn');
    if (btn && !btn.disabled) dispatchItem(btn.dataset.dispatch);
  });
}

function toggleSession(itemId) {
  var panel = document.getElementById('session-' + itemId);
  if (!panel) return;
  if (panel.classList.contains('open')) {
    panel.classList.remove('open');
    return;
  }
  panel.innerHTML = '<div style="padding:12px;color:var(--text-muted)">Loading session...</div>';
  panel.classList.add('open');
  fetch('session.json?_ts=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(entries) {
      if (!entries || !entries.length) {
        panel.innerHTML = '<div style="padding:12px;color:var(--text-dim)">No session data</div>';
        return;
      }
      var html = '<div class="session-toolbar">' +
        '<button class="view-session-btn" data-session="' + esc(itemId) + '">↻ Refresh</button>' +
        '<span style="color:var(--text-dim);font-size:10px">' + entries.length + ' messages</span>' +
        '</div>';
      html += entries.map(function(entry) {
        var roleClass = 'role-' + entry.role;
        var ts = entry.timestamp ? entry.timestamp.replace('T', ' ').replace(/\.\d+Z$/, 'Z') : '';
        var blocksHtml = (entry.blocks || []).map(function(b) {
          if (b.type === 'text') {
            return '<div class="session-block session-text">' + esc(b.content) + '</div>';
          } else if (b.type === 'tool_use') {
            return '<div class="session-block session-tool">' +
              '<span class="session-tool-name">⚙ ' + esc(b.tool) + '</span>' +
              '<div class="session-tool-input">' + esc(b.input_preview) + '</div>' +
            '</div>';
          } else if (b.type === 'tool_result') {
            return '<div class="session-block session-result">' + esc(b.content_preview) + '</div>';
          } else if (b.type === 'thinking') {
            var tid = 'think-' + Math.random().toString(36).substr(2, 6);
            return '<div class="session-block session-thinking" data-toggle-thinking="1">' +
              '<span class="session-thinking-label">▸ thinking (' + b.content.length + ' chars)</span>' +
              '<div class="session-thinking-body">' + esc(b.content) + '</div>' +
            '</div>';
          }
          return '';
        }).join('');
        return '<div class="session-entry ' + roleClass + '">' +
          '<div class="session-ts">' + esc(ts) + '</div>' +
          blocksHtml +
        '</div>';
      }).join('');
      panel.innerHTML = html;
      panel.scrollTop = panel.scrollHeight;
    })
    .catch(function(err) {
      panel.innerHTML = '<div style="padding:12px;color:var(--bad)">Error loading session: ' + esc(err.message) + '</div>';
    });
}

document.querySelector('main').addEventListener('click', function(e) {
  var btn = e.target.closest('[data-session]');
  if (btn) toggleSession(btn.dataset.session);
  var thinking = e.target.closest('[data-toggle-thinking]');
  if (thinking) thinking.classList.toggle('open');
});

loadSettings();
renderRoadmap();
</script>
</body>
</html>
